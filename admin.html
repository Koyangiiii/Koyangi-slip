<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Stock Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root{ --bg:#1a1a1a; --main:#9d81e1; --dark:#d1c4e9; --white:#252525; --green:#4caf50; }
        body { background: var(--bg); color: #fff; font-family: 'Mitr', sans-serif; padding: 20px 20px 100px; display: flex; justify-content: center; }
        
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .admin-card { background: var(--white); padding: 25px; border-radius: 20px; width: 100%; max-width: 500px; border: 1px solid var(--main); box-shadow: 0 8px 20px rgba(0,0,0,0.3); margin-bottom: 20px; }
        
        h1, h2 { color: var(--main); text-align: center; margin-bottom: 20px; }
        h2 { font-size: 18px; text-align: left; border-bottom: 1px solid #444; padding-bottom: 10px; }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 13px; margin-bottom: 5px; color: var(--dark); }
        input, textarea, select { width: 100%; padding: 12px; background: #333; border: 1px solid #444; border-radius: 10px; color: #fff; font-family: inherit; outline: none; }
        
        .stock-item { background: #1e1e1e; padding: 15px; border-radius: 15px; margin-bottom: 10px; border: 1px dashed #555; position: relative; }
        .row { display: flex; gap: 10px; margin-bottom: 10px; }
        
        .upload-container { display: flex; gap: 15px; align-items: center; margin-bottom: 15px; background: #2a2a2a; padding: 10px; border-radius: 12px; }
        .img-preview { width: 80px; height: 80px; border-radius: 10px; background: #333; object-fit: cover; border: 1px solid var(--main); }
        .file-input-label { background: var(--main); padding: 8px 15px; border-radius: 8px; font-size: 12px; cursor: pointer; display: inline-block; }
        input[type="file"] { display: none; }

        button { width: 100%; padding: 15px; background: var(--main); border: none; border-radius: 25px; color: #fff; font-weight: 500; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .add-btn { background: var(--green); margin-bottom: 20px; padding: 10px; font-size: 14px; }
        .del-btn { background: #ff5252; padding: 8px; font-size: 12px; margin-top: 5px; width: auto; display: inline-block; }
        .preview-btn { background: transparent; border: 2px solid var(--main); color: var(--main); text-decoration: none; display: block; text-align: center; margin-top: 10px; padding: 12px; border-radius: 25px; }

        /* --- ปรับปรุงสไตล์ Bottom Nav ให้กะทัดรัด (Compact) --- */
        .bottom-nav { 
            position: fixed; 
            bottom: 0; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 100%; 
            max-width: 450px; 
            background: #252525; 
            display: flex; 
            justify-content: space-around; 
            padding: 8px 0 12px; 
            border-radius: 15px 15px 0 0; 
            border-top: 1.5px solid var(--main); 
            box-shadow: 0 -4px 15px rgba(0,0,0,0.4); 
            z-index: 1000; 
        }

        .nav-item { 
            text-decoration: none; 
            color: var(--dark); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            font-size: 9px; 
            cursor: pointer; 
            flex: 1; 
            background: none;
            border: none;
            outline: none;
        }

        .nav-item.active { color: var(--main); }
        .nav-icon { font-size: 16px; margin-bottom: 2px; }
    </style>
</head>
<body>

    <!-- ล็อกอิน -->
    <div id="login-overlay">
        <div class="admin-card">
            <h1>🔐 Admin Login</h1>
            <input type="password" id="passInput" placeholder="Password">
            <button onclick="checkPass()">ตกลง</button>
        </div>
    </div>

    <!-- ส่วนจัดการสต็อก -->
    <div id="main-admin" style="display:none; width: 100%; max-width: 500px;">
        <div class="admin-card">
            <h2>📦 จัดการสินค้า (อัปโหลดรูป)</h2>
            <div id="stock-container"></div>
            <button class="add-btn" onclick="addAppItem()">➕ เพิ่มสินค้าใหม่</button>
            <button onclick="saveData()">💾 บันทึกสต็อกสินค้า</button>
            <a href="index.html" class="preview-btn">👁️ กลับหน้าหลัก</a>
        </div>
    </div>

    <!-- แถบเมนู Bottom Nav ใหม่ -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <span class="nav-icon">🏠</span>
            <span>หน้าหลัก</span>
        </a>
        <a href="portfolio.html" class="nav-item">
            <span class="nav-icon">📦</span>
            <span>สินค้า</span>
        </a>
        <a href="contact.html" class="nav-item">
            <span class="nav-icon">💬</span>
            <span>ติดต่อ</span>
        </a>
        <div class="nav-item active" onclick="checkAdminAccess()">
            <span class="nav-icon">⚙️</span>
            <span>ตั้งค่า</span>
        </div>
    </nav>

    <script>
        const PIN = "2003";

        window.onload = function() {
            if (sessionStorage.getItem("isLoggedIn") === "true") unlockAdmin();
        }

        function checkPass() {
            if (document.getElementById("passInput").value === PIN) {
                sessionStorage.setItem("isLoggedIn", "true");
                unlockAdmin();
            } else { alert("รหัสผิด!"); }
        }

        function unlockAdmin() {
            document.getElementById("login-overlay").style.display = "none";
            document.getElementById("main-admin").style.display = "block";
            loadData();
        }

        // ฟังก์ชันเช็คการล็อกอินซ้ำ (ใช้สำหรับปุ่มใน Nav)
        function checkAdminAccess() {
            if (sessionStorage.getItem("isLoggedIn") === "true") {
                location.reload(); // ถ้าอยู่หน้าเดิมให้รีโหลด
            } else {
                document.getElementById("login-overlay").style.display = "flex";
            }
        }

        function handleFileSelect(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const preview = input.parentElement.parentElement.querySelector('.img-preview');
                    preview.src = e.target.result;
                    preview.dataset.base64 = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        }

        function addAppItem(name = '', price = '', stock = '', cat = 'streaming', imgData = '') {
            const container = document.getElementById('stock-container');
            const itemDiv = document.createElement('div');
            itemDiv.className = 'stock-item';
            const displayImg = imgData || 'https://via.placeholder.com/150';

            itemDiv.innerHTML = `
                <div class="upload-container">
                    <img src="${displayImg}" class="img-preview" data-base64="${imgData}">
                    <div>
                        <label class="file-input-label">📸 เลือกรูปภาพ
                            <input type="file" accept="image/*" onchange="handleFileSelect(this)">
                        </label>
                        <p style="font-size:10px; color:#aaa; margin-top:5px;">แนะนำ: รูปสี่เหลี่ยมจัตุรัส</p>
                    </div>
                </div>
                <div class="form-group"><label>ชื่อแอป</label><input type="text" class="app-name" value="${name}"></div>
                <div class="row">
                    <div><label>ราคา</label><input type="text" class="app-price" value="${price}"></div>
                    <div><label>สต็อก</label><input type="number" class="app-stock" value="${stock}"></div>
                </div>
                <div class="form-group">
                    <label>หมวดหมู่</label>
                    <select class="app-cat">
                        <option value="streaming" ${cat==='streaming'?'selected':''}>Streaming</option>
                        <option value="working" ${cat==='working'?'selected':''}>Working</option>
                        <option value="education" ${cat==='education'?'selected':''}>Education</option>
                    </select>
                </div>
                <button class="del-btn" onclick="this.parentElement.remove()">❌ ลบรายการนี้</button>
            `;
            container.appendChild(itemDiv);
        }

        function saveData() {
            const appItems = [];
            document.querySelectorAll('.stock-item').forEach(item => {
                const imgPreview = item.querySelector('.img-preview');
                appItems.push({
                    name: item.querySelector('.app-name').value,
                    price: item.querySelector('.app-price').value,
                    stock: item.querySelector('.app-stock').value,
                    cat: item.querySelector('.app-cat').value,
                    img: imgPreview.dataset.base64 || ''
                });
            });

            let existingData = JSON.parse(localStorage.getItem('shopData')) || {};
            existingData.products = appItems;

            try {
                localStorage.setItem('shopData', JSON.stringify(existingData));
                alert('บันทึกเรียบร้อย!');
            } catch (e) {
                alert('ข้อผิดพลาด: ไฟล์รูปอาจใหญ่เกินไป (รวมไม่ควรเกิน 5MB)');
            }
        }

        function loadData() {
            const savedData = JSON.parse(localStorage.getItem('shopData'));
            if(savedData && savedData.products) {
                document.getElementById('stock-container').innerHTML = '';
                savedData.products.forEach(p => addAppItem(p.name, p.price, p.stock, p.cat, p.img));
            }
        }
    </script>
</body>
</html>
