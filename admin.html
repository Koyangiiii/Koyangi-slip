<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Manage Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root{ --bg:#1a1a1a; --main:#9d81e1; --dark:#d1c4e9; --white:#252525; --red:#ff5252; --glow:rgba(157,129,225,0.3); }
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Mitr',sans-serif;}
        body { background: var(--bg); color: #fff; display: flex; justify-content: center; min-height: 100vh; }
        
        .admin-container { width: 100%; max-width: 500px; padding: 40px 15px 100px; }
        .section-card { background: var(--white); border-radius: 25px; padding: 25px; margin-bottom: 20px; border: 2px solid var(--main); }
        
        input, textarea, select { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #444; border-radius: 12px; color: #fff; margin-bottom: 10px; font-size: 14px; outline: none; }
        select:focus, input:focus { border-color: var(--main); }
        h3 { color: var(--main); margin-bottom: 15px; font-size: 16px; }

        .stock-item { background: #333; border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid #444; position: relative; }
        .item-header { display: flex; align-items: center; gap: 15px; margin-bottom: 10px; }
        .img-preview { width: 50px; height: 50px; border-radius: 10px; object-fit: cover; background: #222; cursor: pointer; border: 1px solid #555; }
        
        .btn { width: 100%; padding: 15px; border-radius: 15px; border: none; font-weight: 500; cursor: pointer; transition: 0.3s; }
        .btn-save { background: var(--main); color: #fff; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: calc(100% - 30px); max-width: 470px; z-index: 100; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
        .btn-add { background: transparent; color: var(--main); border: 2px dashed var(--main); margin-top: 10px; }
        .btn-del { background: rgba(255, 82, 82, 0.1); color: var(--red); font-size: 12px; padding: 8px; margin-top: 5px; border-radius: 10px; }

        #login-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:9999; display:flex; justify-content:center; align-items:center; backdrop-filter: blur(10px); }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div style="text-align:center; width: 300px;">
            <h3 style="margin-bottom:20px;">🔐 Admin Access</h3>
            <input type="tel" id="passInput" style="text-align:center; letter-spacing:10px; font-size:24px;" maxlength="4" placeholder="••••">
            <button class="btn" style="background:var(--main); color:#fff;" onclick="checkPass()">ปลดล็อกระบบ</button>
        </div>
    </div>

    <div id="main-admin" class="admin-container" style="display:none;">
        <h1 style="text-align:center; margin-bottom:30px;">🛠️ ระบบจัดการสต็อก</h1>

        <div class="section-card">
            <h3>🏠 ข้อมูลร้านพื้นฐาน</h3>
            <input type="text" id="shopName" placeholder="ชื่อร้าน">
            <input type="text" id="shopLine" placeholder="ลิงก์ไลน์ (https://line.me/...)">
            <textarea id="shopRules" rows="3" placeholder="กฎการรับประกันสินค้า"></textarea>
            <p style="font-size: 11px; color: #888;">* รูปโลโก้จะใช้ไฟล์ล่าสุดที่บันทึกไว้</p>
        </div>

        <div class="section-card">
            <h3>📦 รายการสินค้า</h3>
            <div id="stock-container"></div>
            <button class="btn btn-add" onclick="addItem()">➕ เพิ่มสินค้าใหม่</button>
        </div>

        <button class="btn btn-save" onclick="saveAll()">💾 บันทึกการเปลี่ยนแปลงทั้งหมด</button>
    </div>

    <script>
        const PIN = "2003";

        function checkPass() {
            if (document.getElementById("passInput").value === PIN) {
                document.getElementById("login-overlay").style.display = "none";
                document.getElementById("main-admin").style.display = "block";
                loadData();
            } else { alert("รหัสผ่านไม่ถูกต้อง!"); }
        }

        function addItem(cat='streaming', subCat='', name='', price='', stock='', img='') {
            const container = document.getElementById('stock-container');
            const div = document.createElement('div');
            div.className = 'stock-item';
            div.innerHTML = `
                <div class="item-header">
                    <div style="position:relative;">
                        <img src="${img || 'https://via.placeholder.com/50'}" class="img-preview" onclick="this.nextElementSibling.click()">
                        <input type="file" hidden accept="image/*" onchange="handleImg(this)">
                    </div>
                    <div style="flex:1">
                        <select class="p-cat">
                            <option value="streaming" ${cat==='streaming'?'selected':''}>📺 Streaming Apps</option>
                            <option value="working" ${cat==='working'?'selected':''}>💼 Working Tools</option>
                            <option value="education" ${cat==='education'?'selected':''}>🎓 Education</option>
                        </select>
                        <input type="text" class="p-subcat" placeholder="แอปหลัก (เช่น Netflix)" value="${subCat}" style="margin:0">
                    </div>
                </div>
                <input type="text" class="p-name" placeholder="ชื่อแพ็กเกจ (เช่น 30 วัน จอส่วนตัว)" value="${name}">
                <div style="display:flex; gap:10px;">
                    <input type="number" class="p-price" placeholder="ราคา" value="${price}">
                    <input type="number" class="p-stock" placeholder="สต็อก" value="${stock}">
                </div>
                <button class="btn btn-del" onclick="if(confirm('ลบรายการนี้?')) this.parentElement.remove()">🗑️ ลบรายการนี้</button>
            `;
            container.appendChild(div);
        }

        function handleImg(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => { input.previousElementSibling.src = e.target.result; };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function saveAll() {
            const products = [];
            document.querySelectorAll('.stock-item').forEach(item => {
                products.push({
                    cat: item.querySelector('.p-cat').value,
                    subCat: item.querySelector('.p-subcat').value,
                    name: item.querySelector('.p-name').value,
                    price: item.querySelector('.p-price').value,
                    stock: item.querySelector('.p-stock').value,
                    img: item.querySelector('.img-preview').src
                });
            });

            const oldData = JSON.parse(localStorage.getItem('shopData')) || {};
            const newData = {
                ...oldData,
                name: document.getElementById('shopName').value,
                line: document.getElementById('shopLine').value,
                rules: document.getElementById('shopRules').value,
                products: products
            };

            localStorage.setItem('shopData', JSON.stringify(newData));
            alert("✅ บันทึกสต็อกและหมวดหมู่เรียบร้อย!");
        }

        function loadData() {
            const data = JSON.parse(localStorage.getItem('shopData')) || {};
            document.getElementById('shopName').value = data.name || "";
            document.getElementById('shopLine').value = data.line || "";
            document.getElementById('shopRules').value = data.rules || "";
            
            const container = document.getElementById('stock-container');
            container.innerHTML = '';
            if (data.products && data.products.length > 0) {
                data.products.forEach(p => addItem(p.cat, p.subCat, p.name, p.price, p.stock, p.img));
            } else {
                addItem(); // เพิ่มช่องเปล่า 1 ช่องถ้าไม่มีข้อมูล
            }
        }
    </script>
</body>
</html>
