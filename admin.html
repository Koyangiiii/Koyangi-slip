<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Stock Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root{ --bg:#1a1a1a; --main:#9d81e1; --dark:#d1c4e9; --white:#252525; --green:#4caf50; --red:#ff5252; --glow:rgba(157,129,225,0.3); }
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Mitr',sans-serif;}
        body { background: var(--bg); color: #fff; display: flex; justify-content: center; min-height: 100vh; }
        
        /* --- Sidebar & Hamburger (เหมือนหน้าแรก) --- */
        .hamburger {
            position: fixed; top: 20px; right: 20px; z-index: 1001;
            background: var(--main); width: 45px; height: 45px; border-radius: 12px;
            display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 5px;
            cursor: pointer; box-shadow: 0 4px 15px var(--glow);
        }
        .hamburger span { width: 25px; height: 3px; background: #fff; border-radius: 2px; transition: 0.3s; }
        
        .sidebar {
            position: fixed; top: 0; right: -280px; width: 280px; height: 100%;
            background: #252525; z-index: 1000; padding: 80px 20px 20px;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: -5px 0 25px rgba(0,0,0,0.5); border-left: 2px solid var(--main);
        }
        .sidebar.active { right: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 999; backdrop-filter: blur(3px); }
        .overlay.active { display: block; }

        .nav-item {
            text-decoration: none; color: var(--dark); display: flex; align-items: center;
            padding: 15px 20px; margin-bottom: 10px; border-radius: 15px; font-size: 16px;
            transition: 0.3s; gap: 15px; cursor: pointer;
        }
        .nav-item:hover, .nav-item.active { background: rgba(157, 129, 225, 0.1); color: var(--main); }
        .nav-icon { font-size: 20px; }

        .hamburger.active span:nth-child(1) { transform: translateY(8px) rotate(45deg); }
        .hamburger.active span:nth-child(2) { opacity: 0; }
        .hamburger.active span:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }

        /* --- Login Modal --- */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .login-card { background: var(--white); padding: 40px 30px; border-radius: 30px; width: 90%; max-width: 360px; border: 2px solid var(--main); box-shadow: 0 0 30px var(--glow); text-align: center; }
        .login-input { width: 100%; padding: 15px; background: #1a1a1a; border: 1.5px solid #444; border-radius: 15px; color: #fff; font-size: 24px; text-align: center; outline: none; margin-bottom: 20px; letter-spacing: 5px; }

        /* --- Main Admin Container --- */
        .admin-container { width: 100%; max-width: 480px; padding: 80px 15px 50px; }
        .header-section { text-align: center; margin-bottom: 20px; }
        .header-section h1 { color: var(--main); font-size: 24px; }

        .search-box { position: relative; margin-bottom: 20px; }
        .search-box input { width: 100%; padding: 15px 20px 15px 45px; background: var(--white); border: 1.5px solid #444; border-radius: 18px; color: #fff; outline: none; transition: 0.3s; }
        .search-box input:focus { border-color: var(--main); box-shadow: 0 0 15px var(--glow); }
        .search-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--main); font-size: 18px; }

        .stock-item { background: var(--white); border-radius: 22px; padding: 20px; margin-bottom: 20px; border: 1px solid #333; position: relative; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .stock-item.hidden { display: none; }
        
        .item-header { display: flex; gap: 15px; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #3d3d3d; }
        .img-box { position: relative; width: 80px; height: 80px; flex-shrink: 0; }
        .img-preview { width: 100%; height: 100%; border-radius: 15px; object-fit: cover; background: #333; border: 1.5px solid var(--main); }
        .file-label { position: absolute; bottom: -5px; right: -5px; background: var(--main); width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; cursor: pointer; border: 2px solid var(--white); }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        label { display: block; font-size: 12px; color: var(--dark); margin-bottom: 6px; }
        input, select { width: 100%; padding: 12px 15px; background: #1a1a1a; border: 1px solid #444; border-radius: 12px; color: #fff; outline: none; font-size: 14px; }

        .btn { border: none; border-radius: 15px; font-weight: 500; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; }
        .btn-save { background: var(--main); color: white; padding: 15px; font-size: 16px; margin-top: 10px; border-radius: 20px; }
        .btn-add { background: #333; color: var(--main); border: 1.5px dashed var(--main); padding: 12px; margin-bottom: 20px; }
        .btn-del { background: rgba(255, 82, 82, 0.1); color: var(--red); padding: 8px; font-size: 13px; margin-top: 5px; border-radius: 12px; }
        
        .preview-link { display: block; text-align: center; color: var(--dark); text-decoration: none; margin-top: 20px; font-size: 14px; opacity: 0.7; }
    </style>
</head>
<body>

    <!-- Sidebar Menu (เหมือนหน้าแรก) -->
    <div class="hamburger" onclick="toggleMenu()">
        <span></span><span></span><span></span>
    </div>
    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <nav class="sidebar" id="sidebar">
        <a href="index.html" class="nav-item">
            <span class="nav-icon">🏠</span><span>หน้าหลัก</span>
        </a>
        <a href="portfolio.html" class="nav-item">
            <span class="nav-icon">📦</span><span>สินค้า</span>
        </a>
        <a href="contact.html" class="nav-item">
            <span class="nav-icon">💬</span><span>ติดต่อเรา</span>
        </a>
        <div onclick="toggleMenu()" class="nav-item active">
            <span class="nav-icon">⚙️</span><span>ตั้งค่าระบบ</span>
        </div>
    </nav>

    <!-- Login Modal -->
    <div id="login-overlay">
        <div class="login-card">
            <h2 style="color:var(--main); margin-bottom:10px;">🔐 Admin Login</h2>
            <p style="font-size:13px; color:#888; margin-bottom:25px;">กรุณากรอกรหัสผ่านเพื่อเข้าถึงระบบสต็อก</p>
            <input type="password" id="passInput" class="login-input" placeholder="••••" autocomplete="off">
            <button class="btn btn-save" onclick="checkPass()">ตกลง</button>
        </div>
    </div>

    <!-- Main Content -->
    <div id="main-admin" class="admin-container" style="display:none;">
        <div class="header-section">
            <h1>📦 Stock Management</h1>
            <p style="font-size: 12px; color: var(--dark);">ค้นหาและแก้ไขข้อมูลสินค้าของคุณ</p>
        </div>

        <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" placeholder="พิมพ์ชื่อสินค้า..." onkeyup="filterProducts()">
        </div>

        <div id="stock-container"></div>

        <button class="btn btn-add" onclick="addAppItem()">
            <span>➕ เพิ่มสินค้าใหม่</span>
        </button>

        <button class="btn btn-save" onclick="saveData()">
            <span>💾 บันทึกการเปลี่ยนแปลง</span>
        </button>
        
        <a href="index.html" class="preview-link">👁️ กลับไปหน้าหลักเพื่อดูผลลัพธ์</a>
    </div>

    <script>
        const PIN = "2003";

        // Sidebar Toggle
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
            document.querySelector('.hamburger').classList.toggle('active');
        }

        window.onload = function() {
            if (sessionStorage.getItem("isLoggedIn") === "true") unlockAdmin();
            document.getElementById('passInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') checkPass(); });
        }

        function checkPass() {
            const input = document.getElementById("passInput");
            if (input.value === PIN) {
                sessionStorage.setItem("isLoggedIn", "true");
                unlockAdmin();
            } else { 
                alert("❌ รหัสผ่านไม่ถูกต้อง!"); 
                input.value = "";
            }
        }

        function unlockAdmin() {
            document.getElementById("login-overlay").style.display = "none";
            document.getElementById("main-admin").style.display = "block";
            loadData();
        }

        function filterProducts() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const items = document.querySelectorAll('.stock-item');
            items.forEach(item => {
                const productName = item.querySelector('.app-name').value.toLowerCase();
                item.classList.toggle('hidden', !productName.includes(searchTerm));
            });
        }

        function handleFileSelect(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 400;
                        const scaleSize = MAX_WIDTH / img.width;
                        canvas.width = MAX_WIDTH;
                        canvas.height = img.height * scaleSize;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7);
                        const preview = input.closest('.stock-item').querySelector('.img-preview');
                        preview.src = compressedBase64;
                        preview.dataset.base64 = compressedBase64;
                    };
                };
                reader.readAsDataURL(file);
            }
        }

        function addAppItem(name = '', price = '', stock = '', cat = 'streaming', imgData = '') {
            const container = document.getElementById('stock-container');
            const itemDiv = document.createElement('div');
            itemDiv.className = 'stock-item';
            const displayImg = imgData || 'https://via.placeholder.com/150';

            itemDiv.innerHTML = `
                <div class="item-header">
                    <div class="img-box">
                        <img src="${displayImg}" class="img-preview" data-base64="${imgData}">
                        <label class="file-label">
                            📷 <input type="file" accept="image/*" style="display:none" onchange="handleFileSelect(this)">
                        </label>
                    </div>
                    <div class="item-title-group">
                        <label>ชื่อแอปพรีเมียม</label>
                        <input type="text" class="app-name" placeholder="ชื่อแอป..." value="${name}">
                    </div>
                </div>
                <div class="form-grid">
                    <div class="form-group"><label>ราคา (บาท)</label><input type="number" class="app-price" value="${price}"></div>
                    <div class="form-group"><label>สต็อก</label><input type="number" class="app-stock" value="${stock}"></div>
                    <div class="form-group" style="grid-column: span 2">
                        <label>หมวดหมู่</label>
                        <select class="app-cat">
                            <option value="streaming" ${cat==='streaming'?'selected':''}>📺 Streaming</option>
                            <option value="working" ${cat==='working'?'selected':''}>💼 Working</option>
                            <option value="education" ${cat==='education'?'selected':''}>🎓 Education</option>
                        </select>
                    </div>
                </div>
                <button class="btn btn-del" onclick="if(confirm('ลบรายการนี้?')) { this.closest('.stock-item').remove(); saveData(); }">🗑️ ลบ</button>
            `;
            container.appendChild(itemDiv);
        }

        function saveData() {
            const appItems = [];
            document.querySelectorAll('.stock-item').forEach(item => {
                const imgPreview = item.querySelector('.img-preview');
                appItems.push({
                    name: item.querySelector('.app-name').value,
                    price: item.querySelector('.app-price').value,
                    stock: item.querySelector('.app-stock').value,
                    cat: item.querySelector('.app-cat').value,
                    img: imgPreview.dataset.base64 || ''
                });
            });
            let existingData = JSON.parse(localStorage.getItem('shopData')) || {};
            existingData.products = appItems;
            try {
                localStorage.setItem('shopData', JSON.stringify(existingData));
                alert('✅ บันทึกสต็อกเรียบร้อยแล้ว!');
            } catch (e) {
                alert('❌ พื้นที่เต็ม!');
            }
        }

        function loadData() {
            const savedData = JSON.parse(localStorage.getItem('shopData'));
            if(savedData && savedData.products) {
                document.getElementById('stock-container').innerHTML = '';
                savedData.products.forEach(p => addAppItem(p.name, p.price, p.stock, p.cat, p.img));
            }
        }
    </script>
</body>
</html>
