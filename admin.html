<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Stock Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root{ --bg:#1a1a1a; --main:#9d81e1; --dark:#d1c4e9; --white:#252525; --green:#4caf50; --red:#ff5252; --glow:rgba(157,129,225,0.3); }
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Mitr',sans-serif;}
        body { background: var(--bg); color: #fff; display: flex; justify-content: center; min-height: 100vh; }
        
        /* --- UI Elements --- */
        .hamburger { position: fixed; top: 20px; right: 20px; z-index: 1100; background: var(--main); width: 45px; height: 45px; border-radius: 12px; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 5px; cursor: pointer; box-shadow: 0 4px 15px var(--glow); transition: 0.3s; }
        .hamburger span { width: 25px; height: 3px; background: #fff; border-radius: 2px; transition: 0.3s ease-in-out; display: block; }
        .hamburger.active span:nth-child(1) { transform: translateY(8px) rotate(45deg); }
        .hamburger.active span:nth-child(2) { opacity: 0; transform: translateX(20px); }
        .hamburger.active span:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }

        .sidebar { position: fixed; top: 0; right: -280px; width: 280px; height: 100%; background: #252525; z-index: 1050; padding: 80px 20px 20px; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: -5px 0 25px rgba(0,0,0,0.5); border-left: 2px solid var(--main); }
        .sidebar.active { right: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 999; backdrop-filter: blur(3px); }
        .overlay.active { display: block; }

        .admin-container { width: 100%; max-width: 500px; padding: 40px 15px 120px; }
        .section-card { background: var(--white); border-radius: 25px; padding: 20px; margin-bottom: 20px; border: 1.5px solid var(--main); box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        
        select, input { width: 100%; padding: 10px 15px; background: #1a1a1a; border: 1.2px solid #444; border-radius: 12px; color: #fff; outline: none; font-size: 14px; transition: 0.3s; }
        select:focus, input:focus { border-color: var(--main); }

        /* --- Stock Item Style --- */
        .stock-item { background: #2d2d2d; border-radius: 20px; padding: 15px; margin-bottom: 15px; border: 1px solid #444; position: relative; transition: 0.3s; }
        .stock-item.out-of-stock { opacity: 0.6; filter: grayscale(0.8); border: 1px solid var(--red); }
        .stock-item.out-of-stock::after { content: "SOLD OUT"; position: absolute; top: 10px; right: 10px; background: var(--red); color: white; font-size: 10px; padding: 2px 8px; border-radius: 5px; font-weight: bold; }
        .stock-item.hidden-item { opacity: 0.5; border-style: dashed; }

        .item-header { display: flex; gap: 12px; align-items: flex-start; margin-bottom: 12px; }
        .img-box { position: relative; width: 65px; height: 65px; flex-shrink: 0; }
        .img-preview { width: 100%; height: 100%; border-radius: 12px; object-fit: cover; background: #1a1a1a; border: 1px solid #444; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .btn { border: none; border-radius: 12px; font-weight: 500; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; }
        
        .floating-save { position: fixed; bottom: 25px; right: 20px; left: 20px; max-width: 460px; margin: 0 auto; z-index: 900; background: var(--main); color: white; padding: 16px; font-size: 16px; box-shadow: 0 8px 25px var(--glow); border-radius: 18px; border: 2px solid rgba(255,255,255,0.2); }
        .floating-save:active { transform: scale(0.95); }

        .btn-add { background: transparent; color: var(--main); border: 2.5px dashed var(--main); padding: 12px; margin-bottom: 40px; border-radius: 20px; }
        
        .action-btns { display: flex; gap: 8px; margin-top: 12px; }
        .btn-mini { padding: 8px; font-size: 12px; border-radius: 10px; flex: 1; }
        .btn-hide { background: #444; color: #fff; }
        .btn-hide.active { background: #ff9800; }
        .btn-del { background: rgba(255, 82, 82, 0.1); color: var(--red); }

        /* Login Overlay */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .login-card { background: var(--white); padding: 40px 30px; border-radius: 30px; width: 90%; max-width: 360px; border: 2px solid var(--main); text-align: center; }
        
        .nav-item { text-decoration: none; color: var(--dark); display: flex; align-items: center; padding: 15px 20px; margin-bottom: 10px; border-radius: 15px; font-size: 16px; transition: 0.3s; gap: 15px; }
        .bottom-nav-box { margin-top: 30px; border-top: 1px solid #444; padding-top: 20px; text-align: center; }
        .back-link-btn { display: inline-flex; align-items: center; gap: 8px; background: #333; color: #ccc; padding: 12px 25px; border-radius: 50px; text-decoration: none; font-size: 14px; transition: 0.3s; }
    </style>
</head>
<body>

    <div class="hamburger" onclick="toggleMenu()"><span></span><span></span><span></span></div>
    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <nav class="sidebar" id="sidebar">
        <a href="index.html" class="nav-item">🏠 หน้าหลัก</a>
        <a href="portfolio.html" class="nav-item">📦 สินค้า</a>
        <a href="contact.html" class="nav-item">💬 ติดต่อเรา</a>
        <div onclick="toggleMenu()" class="nav-item active" style="cursor:pointer;">⚙️ ตั้งค่าระบบ</div>
    </nav>

    <!-- Login Overlay พร้อมรหัสผ่านภาษาไทย -->
    <div id="login-overlay">
        <div class="login-card">
            <h3>🔐 Admin Access</h3>
            <input type="text" id="safePinInput" placeholder="กรอกรหัสผ่าน" autocomplete="off" readonly onfocus="this.removeAttribute('readonly');" 
            style="font-size: 24px; text-align: center; letter-spacing: 2px; -webkit-text-security: disc; margin-bottom: 20px; background: #1a1a1a; color: var(--main); width: 100%;">
            <button class="btn btn-save" style="background:var(--main); color:white; padding:12px; margin-top:10px;" onclick="checkPass()">ปลดล็อกระบบ</button>
        </div>
    </div>

    <div id="main-admin" class="admin-container" style="display:none;">
        <div style="text-align:center; margin-bottom:30px;">
            <h1 style="color: var(--main);">🛠️ Control Panel</h1>
            <p style="font-size: 13px; color: var(--dark);">อัปเดตสต็อกและสถานะสินค้า</p>
        </div>

        <div class="section-card">
            <h3 style="color:var(--main); margin-bottom:15px;">📦 รายการสินค้า</h3>
            <div id="stock-container"></div>
            <button class="btn btn-add" onclick="addAppItem()">➕ เพิ่มสินค้าใหม่</button>
        </div>

        <button class="btn floating-save" onclick="saveData()">
            💾 บันทึกการเปลี่ยนแปลงทั้งหมด
        </button>

        <div class="bottom-nav-box">
            <a href="portfolio.html" class="back-link-btn">⬅️ กลับไปหน้าสินค้า</a>
            <p style="font-size: 11px; color: #666; margin-top: 15px;">ระบบจะบันทึกลงใน Browser นี้เท่านั้น</p>
        </div>
    </div>

    <script>
        // เปลี่ยนรหัสผ่านที่นี่
        const PIN = "แอดมินออม"; 

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
            document.querySelector('.hamburger').classList.toggle('active');
        }

        function checkPass() {
            const input = document.getElementById("safePinInput");
            if (input.value === PIN) {
                sessionStorage.setItem("isLoggedIn", "true");
                unlockAdmin();
            } else { 
                alert("❌ รหัสผ่านไม่ถูกต้อง!"); 
                input.value = ""; 
                input.focus();
            }
        }

        function unlockAdmin() {
            document.getElementById("login-overlay").style.display = "none";
            document.getElementById("main-admin").style.display = "block";
            loadData();
        }

        function checkStockStatus(input) {
            const item = input.closest('.stock-item');
            const stockVal = parseInt(input.value);
            if (stockVal <= 0 || isNaN(stockVal)) {
                item.classList.add('out-of-stock');
            } else {
                item.classList.remove('out-of-stock');
            }
        }

        function addAppItem(data = {}) {
            const container = document.getElementById('stock-container');
            const itemDiv = document.createElement('div');
            
            const {
                name = '', price = '', stock = '', 
                cat = 'streaming', img = 'https://via.placeholder.com/150', 
                subCat = '', isHidden = false
            } = data;

            const outStockClass = (stock !== '' && parseInt(stock) <= 0) ? 'out-of-stock' : '';
            itemDiv.className = `stock-item ${isHidden ? 'hidden-item' : ''} ${outStockClass}`;
            itemDiv.dataset.hidden = isHidden;
            
            itemDiv.innerHTML = `
                <div class="item-header">
                    <div class="img-box">
                        <img src="${img}" class="img-preview" data-base64="${img}">
                        <input type="file" accept="image/*" style="display:none" onchange="handleFile(this)">
                        <div style="position:absolute; bottom:-5px; right:-5px; background:var(--main); border-radius:50%; width:22px; height:22px; font-size:10px; display:flex; align-items:center; justify-content:center; cursor:pointer; border: 2px solid #2d2d2d;" onclick="this.previousElementSibling.click()">📷</div>
                    </div>
                    <div style="flex-grow:1;">
                        <select class="app-cat" style="margin-bottom:5px; height:35px; border-color:var(--main);">
                            <option value="streaming" ${cat === 'streaming' ? 'selected' : ''}>📺 Streaming</option>
                            <option value="working" ${cat === 'working' ? 'selected' : ''}>💼 Working</option>
                            <option value="education" ${cat === 'education' ? 'selected' : ''}>🎓 Education</option>
                        </select>
                        <input type="text" class="app-subcat" placeholder="ชื่อแอป (เช่น Netflix)" value="${subCat}">
                    </div>
                </div>
                
                <input type="text" class="app-name" placeholder="ชื่อแพ็กเกจ (เช่น 30 วัน / 1 จอ)" value="${name}">
                
                <div class="form-grid">
                    <div style="font-size:11px; color:var(--dark);">ราคา (บาท)
                        <input type="number" class="app-price" value="${price}" placeholder="ราคา">
                    </div>
                    <div style="font-size:11px; color:var(--dark);">สต็อก (ชิ้น)
                        <input type="number" class="app-stock" value="${stock}" placeholder="สต็อก" oninput="checkStockStatus(this)">
                    </div>
                </div>

                <div class="action-btns">
                    <button class="btn btn-mini btn-hide ${isHidden ? 'active' : ''}" onclick="toggleHide(this)">
                        ${isHidden ? '👁️‍🗨️ ซ่อนอยู่' : '👁️ แสดงอยู่'}
                    </button>
                    <button class="btn btn-mini btn-del" onclick="if(confirm('ลบรายการนี้?')){this.closest('.stock-item').remove()}">🗑️ ลบ</button>
                </div>
            `;
            container.appendChild(itemDiv);
        }

        function toggleHide(btn) {
            const item = btn.closest('.stock-item');
            const isCurrentlyHidden = item.dataset.hidden === "true";
            const newState = !isCurrentlyHidden;
            item.dataset.hidden = newState;
            item.classList.toggle('hidden-item', newState);
            btn.classList.toggle('active', newState);
            btn.innerHTML = newState ? '👁️‍🗨️ ซ่อนอยู่' : '👁️ แสดงอยู่';
        }

        function handleFile(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const preview = input.closest('.stock-item').querySelector('.img-preview');
                    preview.src = e.target.result;
                    preview.dataset.base64 = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        }

        function saveData() {
            const products = [];
            const oldData = JSON.parse(localStorage.getItem('shopData')) || {};
            document.querySelectorAll('.stock-item').forEach(item => {
                const previewImg = item.querySelector('.img-preview');
                products.push({
                    cat: item.querySelector('.app-cat').value,
                    subCat: item.querySelector('.app-subcat').value,
                    name: item.querySelector('.app-name').value,
                    price: item.querySelector('.app-price').value,
                    stock: item.querySelector('.app-stock').value,
                    img: previewImg.dataset.base64 || previewImg.src,
                    isHidden: item.dataset.hidden === "true"
                });
            });
            const newData = { ...oldData, products: products };
            localStorage.setItem('shopData', JSON.stringify(newData));
            
            const saveBtn = document.querySelector('.floating-save');
            saveBtn.innerHTML = "✅ บันทึกสำเร็จ!";
            saveBtn.style.background = "var(--green)";
            setTimeout(() => {
                saveBtn.innerHTML = "💾 บันทึกการเปลี่ยนแปลงทั้งหมด";
                saveBtn.style.background = "var(--main)";
            }, 2000);
        }

        function loadData() {
            const savedData = JSON.parse(localStorage.getItem('shopData'));
            if(savedData && savedData.products) {
                const container = document.getElementById('stock-container');
                container.innerHTML = '';
                savedData.products.forEach(p => addAppItem(p));
            }
        }

        document.getElementById('safePinInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') checkPass();
        });

        window.onload = () => { 
            if (sessionStorage.getItem("isLoggedIn") === "true") {
                unlockAdmin();
            }
        };
    </script>
</body>
</html>
