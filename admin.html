<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Manage Premium Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root{ --bg:#1a1a1a; --main:#9d81e1; --dark:#d1c4e9; --white:#252525; --green:#4caf50; }
        body { background: var(--bg); color: #fff; font-family: 'Mitr', sans-serif; padding: 20px 20px 120px; display: flex; justify-content: center; }
        
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .admin-card { background: var(--white); padding: 25px; border-radius: 20px; width: 100%; max-width: 500px; border: 1px solid var(--main); box-shadow: 0 8px 20px rgba(0,0,0,0.3); margin-bottom: 20px; }
        
        h1, h2 { color: var(--main); text-align: center; margin-bottom: 20px; }
        h2 { font-size: 18px; text-align: left; border-bottom: 1px solid #444; padding-bottom: 10px; }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 13px; margin-bottom: 5px; color: var(--dark); }
        input, textarea, select { width: 100%; padding: 12px; background: #333; border: 1px solid #444; border-radius: 10px; color: #fff; font-family: inherit; outline: none; }
        
        .stock-item { background: #1e1e1e; padding: 15px; border-radius: 15px; margin-bottom: 10px; border: 1px dashed #555; }
        .row { display: flex; gap: 10px; margin-bottom: 10px; }
        
        button { width: 100%; padding: 15px; background: var(--main); border: none; border-radius: 25px; color: #fff; font-weight: 500; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .add-btn { background: var(--green); margin-bottom: 20px; padding: 10px; font-size: 14px; }
        .del-btn { background: #ff5252; padding: 8px; font-size: 12px; margin-top: 5px; width: auto; display: inline-block; }
        .preview-btn { background: transparent; border: 2px solid var(--main); color: var(--main); text-decoration: none; display: block; text-align: center; margin-top: 10px; padding: 12px; border-radius: 25px; }

        .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 500px; background: #252525; display: flex; justify-content: space-around; padding: 12px 0; border-top: 2px solid var(--main); z-index: 1000; }
        .nav-item { text-decoration: none; color: var(--dark); display: flex; flex-direction: column; align-items: center; font-size: 11px; }
        .nav-item.active { color: var(--main); }
    </style>
</head>
<body>

    <!-- Login -->
    <div id="login-overlay">
        <div class="admin-card">
            <h1>🔐 Admin Login</h1>
            <input type="password" id="passInput" placeholder="กรอกรหัสผ่าน 2003...">
            <button onclick="checkPass()">ตกลง</button>
        </div>
    </div>

    <!-- Main Content -->
    <div id="main-admin" style="display:none; width: 100%; max-width: 500px;">
        <div class="admin-card">
            <h2>🏠 ตั้งค่าการติดต่อ</h2>
            <div class="form-group"><label>ลิงก์ LINE (สำหรับกดซื้อ)</label><input type="text" id="lineLink"></div>
            <div class="form-group"><label>เงื่อนไข/กฎของร้าน</label><textarea id="shopRules" rows="3"></textarea></div>
        </div>

        <div class="admin-card">
            <h2>📦 จัดการสินค้า (สต็อก)</h2>
            <div id="stock-container">
                <!-- รายการสินค้าจะงอกที่นี่ -->
            </div>
            <button class="add-btn" onclick="addAppItem()">➕ เพิ่มสินค้าใหม่</button>
            <button onclick="saveData()">💾 บันทึกข้อมูลทั้งหมด</button>
            <a href="index.html" class="preview-btn">👁️ ไปหน้าบ้าน</a>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><span>🏠</span><span>หน้าหลัก</span></a>
        <a href="#" class="nav-item active"><span>⚙️</span><span>ตั้งค่า</span></a>
    </nav>

    <script>
        const PIN = "2003";

        window.onload = function() {
            if (sessionStorage.getItem("isLoggedIn") === "true") unlockAdmin();
        }

        function checkPass() {
            if (document.getElementById("passInput").value === PIN) {
                sessionStorage.setItem("isLoggedIn", "true");
                unlockAdmin();
            } else { alert("รหัสผิด!"); }
        }

        function unlockAdmin() {
            document.getElementById("login-overlay").style.display = "none";
            document.getElementById("main-admin").style.display = "block";
            loadData();
        }

        function addAppItem(name = '', price = '', stock = '', cat = 'streaming') {
            const container = document.getElementById('stock-container');
            const itemDiv = document.createElement('div');
            itemDiv.className = 'stock-item';
            itemDiv.innerHTML = `
                <div class="form-group"><label>ชื่อแอป</label><input type="text" class="app-name" value="${name}"></div>
                <div class="row">
                    <div><label>ราคา</label><input type="text" class="app-price" value="${price}"></div>
                    <div><label>สต็อก</label><input type="number" class="app-stock" value="${stock}"></div>
                </div>
                <div class="form-group">
                    <label>หมวดหมู่</label>
                    <select class="app-cat">
                        <option value="streaming" ${cat==='streaming'?'selected':''}>Streaming</option>
                        <option value="working" ${cat==='working'?'selected':''}>Working</option>
                        <option value="education" ${cat==='education'?'selected':''}>Education</option>
                    </select>
                </div>
                <button class="del-btn" onclick="this.parentElement.remove()">❌ ลบรายการนี้</button>
            `;
            container.appendChild(itemDiv);
        }

        function saveData() {
            const appItems = [];
            document.querySelectorAll('.stock-item').forEach(item => {
                appItems.push({
                    name: item.querySelector('.app-name').value,
                    price: item.querySelector('.app-price').value,
                    stock: item.querySelector('.app-stock').value,
                    cat: item.querySelector('.app-cat').value
                });
            });

            // ดึงข้อมูลเดิมมาเพื่อรักษาชื่อร้านที่อาจถูกเซ็ตไว้ก่อนหน้า (ถ้ามี)
            const oldData = JSON.parse(localStorage.getItem('shopData')) || {};

            const data = {
                ...oldData, // รักษาค่าเดิม (เช่นชื่อร้านที่ลบช่องกรอกออกไปแล้ว)
                line: document.getElementById('lineLink').value,
                rules: document.getElementById('shopRules').value,
                products: appItems
            };

            localStorage.setItem('shopData', JSON.stringify(data));
            alert('บันทึกข้อมูลและสต็อกเรียบร้อย!');
        }

        function loadData() {
            const savedData = JSON.parse(localStorage.getItem('shopData'));
            if(savedData) {
                document.getElementById('lineLink').value = savedData.line || '';
                document.getElementById('shopRules').value = savedData.rules || '';
                if(savedData.products) {
                    document.getElementById('stock-container').innerHTML = ''; // Clear ก่อนโหลดใหม่
                    savedData.products.forEach(p => addAppItem(p.name, p.price, p.stock, p.cat));
                }
            }
        }
    </script>
</body>
</html>
