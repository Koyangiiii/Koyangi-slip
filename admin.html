<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Restricted Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root{ --bg:#1a1a1a; --main:#9d81e1; --dark:#d1c4e9; --white:#252525; }
        
        body { background: var(--bg); color: #fff; font-family: 'Mitr', sans-serif; padding: 20px 20px 100px; display: flex; justify-content: center; min-height: 100vh; align-items: flex-start; }
        
        /* สไตล์หน้า Login บังจอ */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 9999; display: flex; justify-content: center; align-items: center;
        }

        .admin-card { background: var(--white); padding: 30px; border-radius: 20px; width: 90%; max-width: 450px; border: 1px solid var(--main); box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
        
        h1 { color: var(--main); font-size: 24px; margin-bottom: 20px; text-align: center; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 14px; margin-bottom: 5px; color: var(--dark); }
        input, textarea { width: 100%; padding: 12px; background: #333; border: 1px solid #444; border-radius: 10px; color: #fff; font-family: inherit; outline: none; }
        input:focus { border-color: var(--main); }
        
        button { width: 100%; padding: 15px; background: var(--main); border: none; border-radius: 25px; color: #fff; font-weight: 500; cursor: pointer; margin-top: 10px; font-size: 16px; transition: 0.3s; }
        button:hover { opacity: 0.9; }
        
        .preview-btn { background: transparent; border: 2px solid var(--main); color: var(--main); margin-top: 10px; display: block; text-align: center; text-decoration: none; padding: 12px; border-radius: 25px; font-size: 14px; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 500px; background: #252525; display: flex; justify-content: space-around; padding: 12px 0; border-top: 2px solid var(--main); z-index: 1000; }
        .nav-item { text-decoration: none; color: var(--dark); display: flex; flex-direction: column; align-items: center; font-size: 11px; }
        .nav-item.active { color: var(--main); }
    </style>
</head>
<body>

    <!-- ส่วนล็อครหัสผ่าน -->
    <div id="login-overlay">
        <div class="admin-card">
            <h1>🔐 เจ้าของเว็บเท่านั้น</h1>
            <div class="form-group">
                <label>กรอกรหัสผ่านเพื่อจัดการข้อมูล</label>
                <input type="password" id="passInput" placeholder="กรอกรหัสผ่านที่นี่...">
            </div>
            <button onclick="checkPass()">เข้าสู่ระบบ</button>
            <a href="index.html" class="preview-btn">กลับหน้าหลัก</a>
        </div>
    </div>

    <!-- ส่วนเนื้อหาหลัก (Admin) -->
    <div class="admin-card" id="main-admin" style="display:none;">
        <h1>⚙️ จัดการข้อมูลร้าน</h1>
        
        <div class="form-group">
            <label>ชื่อร้าน</label>
            <input type="text" id="shopName">
        </div>
        
        <div class="form-group">
            <label>คำโปรย</label>
            <input type="text" id="shopSlogan">
        </div>

        <div class="form-group">
            <label>เงื่อนไข/กฎของร้าน</label>
            <textarea id="shopRules" rows="4"></textarea>
        </div>

        <div class="form-group">
            <label>ลิงก์ Facebook</label>
            <input type="text" id="fbLink">
        </div>

        <div class="form-group">
            <label>ลิงก์ Line</label>
            <input type="text" id="lineLink">
        </div>

        <button onclick="saveData()">💾 บันทึกข้อมูล</button>
        <button class="preview-btn" onclick="goToPreview()">👁️ ดูหน้าเว็บของคุณ</button>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><span>🏠</span><span>หน้าหลัก</span></a>
        <a href="portfolio.html" class="nav-item"><span>🖼️</span><span>ผลงาน</span></a>
        <a href="contact.html" class="nav-item"><span>💬</span><span>ติดต่อ</span></a>
        <a href="admin.html" class="nav-item active"><span>⚙️</span><span>ตั้งค่า</span></a>
    </nav>

    <script>
        const PIN = "2003"; // รหัสผ่านของคุณ

        // ตรวจสอบสถานะการ Login
        window.onload = function() {
            if (sessionStorage.getItem("isLoggedIn") === "true") {
                unlockAdmin();
            }
        }

        function checkPass() {
            const input = document.getElementById("passInput").value;
            if (input === PIN) {
                sessionStorage.setItem("isLoggedIn", "true");
                unlockAdmin();
            } else {
                alert("รหัสผ่านไม่ถูกต้อง!");
            }
        }

        function unlockAdmin() {
            document.getElementById("login-overlay").style.display = "none";
            document.getElementById("main-admin").style.display = "block";
            loadData();
        }

        function loadData() {
            const savedData = JSON.parse(localStorage.getItem('shopData'));
            if(savedData) {
                document.getElementById('shopName').value = savedData.name || '';
                document.getElementById('shopSlogan').value = savedData.slogan || '';
                document.getElementById('shopRules').value = savedData.rules || '';
                document.getElementById('fbLink').value = savedData.fb || '';
                document.getElementById('lineLink').value = savedData.line || '';
            }
        }

        function saveData() {
            const data = {
                name: document.getElementById('shopName').value,
                slogan: document.getElementById('shopSlogan').value,
                rules: document.getElementById('shopRules').value,
                fb: document.getElementById('fbLink').value,
                line: document.getElementById('lineLink').value
            };
            localStorage.setItem('shopData', JSON.stringify(data));
            alert('บันทึกข้อมูลเรียบร้อยแล้ว!');
        }

        function goToPreview() { window.location.href = 'index.html'; }
    </script>
</body>
</html>
