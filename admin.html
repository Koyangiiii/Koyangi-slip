<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - จัดการข้อมูลร้าน</title>
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root{ --bg:#1a1a1a; --main:#9d81e1; --dark:#d1c4e9; --white:#252525; }
        
        body { background: var(--bg); color: #fff; font-family: 'Mitr', sans-serif; padding: 20px 20px 100px; display: flex; justify-content: center; }
        
        .admin-card { background: var(--white); padding: 30px; border-radius: 20px; width: 100%; max-width: 500px; border: 1px solid var(--main); box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
        
        h1 { color: var(--main); font-size: 24px; margin-bottom: 20px; text-align: center; }
        
        .form-group { margin-bottom: 15px; }
        
        label { display: block; font-size: 14px; margin-bottom: 5px; color: var(--dark); }
        
        input, textarea { width: 100%; padding: 12px; background: #333; border: 1px solid #444; border-radius: 10px; color: #fff; font-family: inherit; outline: none; }
        input:focus, textarea:focus { border-color: var(--main); }
        
        button { width: 100%; padding: 15px; background: var(--main); border: none; border-radius: 25px; color: #fff; font-weight: 500; cursor: pointer; margin-top: 10px; font-size: 16px; transition: 0.3s; }
        button:hover { opacity: 0.9; transform: translateY(-2px); }
        
        .preview-btn { background: transparent; border: 2px solid var(--main); color: var(--main); margin-top: 10px; }

        /* --- แถบเมนูด้านล่าง (Bottom Nav) --- */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 500px;
            background: #252525;
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            border-top: 2px solid var(--main);
            box-shadow: 0 -5px 15px rgba(0,0,0,0.3);
            z-index: 1000;
        }

        .nav-item {
            text-decoration: none;
            color: var(--dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 11px;
            transition: 0.3s;
        }

        .nav-item:hover, .nav-item.active {
            color: var(--main);
        }

        .nav-icon {
            font-size: 20px;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>
    <div class="admin-card">
        <h1>⚙️ จัดการข้อมูลร้าน</h1>
        
        <div class="form-group">
            <label>ชื่อร้าน</label>
            <input type="text" id="shopName" value="𝐊𝐨𝐲𝐚𝐧𝐠𝐢 𝜗𝜚˚⋆">
        </div>
        
        <div class="form-group">
            <label>คำโปรย</label>
            <input type="text" id="shopSlogan" value="รับออกแบบป้าย ลายน้ำ Google Sheet เว็บไซต์⭐️">
        </div>

        <div class="form-group">
            <label>เงื่อนไข/กฎของร้าน</label>
            <textarea id="shopRules" rows="4">• โอนเงินแล้วไม่คืนเงินทุกกรณี
• ยกเลิกหลังเริ่มงาน คืนเงิน 50%
• ยกเลิกหลังเช็คงาน = ไม่คืนเงินและส่งงานปกติ</textarea>
        </div>

        <div class="form-group">
            <label>ลิงก์ Facebook</label>
            <input type="text" id="fbLink" placeholder="https://facebook.com/...">
        </div>

        <div class="form-group">
            <label>ลิงก์ Line</label>
            <input type="text" id="lineLink" placeholder="https://line.me/...">
        </div>

        <button onclick="saveData()">💾 บันทึกข้อมูล</button>
        <button class="preview-btn" onclick="goToPreview()">👁️ ดูหน้าเว็บของคุณ</button>
    </div>

    <!-- --- BOTTOM NAVIGATION BAR --- -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <span class="nav-icon">🏠</span>
            <span>หน้าหลัก</span>
        </a>
        <a href="portfolio.html" class="nav-item">
            <span class="nav-icon">🖼️</span>
            <span>ผลงาน</span>
        </a>
        <a href="contact.html" class="nav-item">
            <span class="nav-icon">💬</span>
            <span>ติดต่อ</span>
        </a>
        <a href="admin.html" class="nav-item active">
            <span class="nav-icon">⚙️</span>
            <span>ตั้งค่า</span>
        </a>
    </nav>

    <script>
        // โหลดข้อมูลเก่ามาแสดงในฟอร์มเมื่อเปิดหน้า
        window.onload = function() {
            const savedData = JSON.parse(localStorage.getItem('shopData'));
            if(savedData) {
                document.getElementById('shopName').value = savedData.name || '';
                document.getElementById('shopSlogan').value = savedData.slogan || '';
                document.getElementById('shopRules').value = savedData.rules || '';
                document.getElementById('fbLink').value = savedData.fb || '';
                document.getElementById('lineLink').value = savedData.line || '';
            }
        }

        function saveData() {
            const data = {
                name: document.getElementById('shopName').value,
                slogan: document.getElementById('shopSlogan').value,
                rules: document.getElementById('shopRules').value,
                fb: document.getElementById('fbLink').value,
                line: document.getElementById('lineLink').value
            };
            localStorage.setItem('shopData', JSON.stringify(data));
            alert('บันทึกข้อมูลเรียบร้อยแล้ว!');
        }

        function goToPreview() {
            window.location.href = 'index.html'; 
        }
    </script>
</body>
</html>
