<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Stock Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root{ --bg:#1a1a1a; --main:#9d81e1; --dark:#d1c4e9; --white:#252525; --green:#4caf50; --red:#ff5252; --glow:rgba(157,129,225,0.3); }
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Mitr',sans-serif;}
        body { background: var(--bg); color: #fff; display: flex; justify-content: center; }
        
        /* --- Sidebar & Hamburger Style (Match Home) --- */
        .hamburger {
            position: fixed; top: 20px; right: 20px; z-index: 1001;
            background: var(--main); width: 45px; height: 45px; border-radius: 12px;
            display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 5px;
            cursor: pointer; box-shadow: 0 4px 15px var(--glow);
        }
        .hamburger span { width: 25px; height: 3px; background: #fff; border-radius: 2px; transition: 0.3s; }
        
        .sidebar {
            position: fixed; top: 0; right: -280px; width: 280px; height: 100%;
            background: #252525; z-index: 1000; padding: 80px 20px 20px;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: -5px 0 25px rgba(0,0,0,0.5); border-left: 2px solid var(--main);
        }
        .sidebar.active { right: 0; }

        .nav-item {
            text-decoration: none; color: var(--dark); display: flex; align-items: center;
            padding: 15px 20px; margin-bottom: 10px; border-radius: 15px; font-size: 16px;
            transition: 0.3s; gap: 15px;
        }
        .nav-item:hover, .nav-item.active { background: rgba(157, 129, 225, 0.1); color: var(--main); }
        .nav-icon { font-size: 20px; }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none; z-index: 999; backdrop-filter: blur(3px);
        }
        .overlay.active { display: block; }

        .hamburger.active span:nth-child(1) { transform: translateY(8px) rotate(45deg); }
        .hamburger.active span:nth-child(2) { opacity: 0; }
        .hamburger.active span:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }

        /* --- Admin Login Modal --- */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); display: flex; justify-content: center; align-items: center; z-index: 2000; padding: 20px; }
        .modal-content { background: var(--white); border: 2px solid var(--main); border-radius: 25px; padding: 30px; width: 100%; max-width: 350px; text-align: center; box-shadow: 0 10px 40px var(--glow); animation: modalPop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes modalPop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        #adminPassInput { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #444; background: #333; color: #fff; text-align: center; font-size: 24px; letter-spacing: 10px; margin-bottom: 20px; outline: none; -webkit-text-security: disc; }

        .modal-btns { display: flex; gap: 10px; }
        .btn-modal { flex: 1; padding: 12px; border-radius: 15px; border: none; cursor: pointer; font-family: 'Mitr'; font-weight: 500; }
        .btn-confirm { background: var(--main); color: #fff; }
        .btn-cancel { background: #444; color: #ccc; }

        /* --- Main Admin Container --- */
        .container { max-width: 500px; width: 100%; padding: 80px 15px 100px; }
        .header-section { text-align: center; margin-bottom: 20px; }
        .header-section h1 { color: var(--main); font-size: 24px; }

        .search-box { position: relative; margin-bottom: 20px; }
        .search-box input { width: 100%; padding: 15px 20px 15px 45px; background: var(--white); border: 1.5px solid #444; border-radius: 18px; color: #fff; outline: none; transition: 0.3s; }
        .search-box input:focus { border-color: var(--main); box-shadow: 0 0 15px var(--glow); }
        .search-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--main); font-size: 18px; }

        .stock-item { background: var(--white); border-radius: 22px; padding: 20px; margin-bottom: 20px; border: 1px solid #333; position: relative; }
        .stock-item.hidden { display: none; }
        .item-header { display: flex; gap: 15px; align-items: center; margin-bottom: 15px; }
        .img-box { position: relative; width: 70px; height: 70px; flex-shrink: 0; }
        .img-preview { width: 100%; height: 100%; border-radius: 15px; object-fit: cover; background: #333; border: 1.5px solid var(--main); }
        .file-label { position: absolute; bottom: -5px; right: -5px; background: var(--main); width: 25px; height: 25px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; cursor: pointer; border: 2px solid var(--white); }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        label { display: block; font-size: 11px; color: var(--dark); margin-bottom: 4px; }
        input, select { width: 100%; padding: 10px; background: #1a1a1a; border: 1px solid #444; border-radius: 10px; color: #fff; outline: none; font-size: 13px; }

        .btn { border: none; border-radius: 15px; font-weight: 500; cursor: pointer; transition: 0.3s; width: 100%; margin-top: 10px; }
        .btn-save { background: var(--main); color: white; padding: 15px; font-size: 16px; border-radius: 20px; }
        .btn-add { background: transparent; color: var(--main); border: 1.5px dashed var(--main); padding: 12px; margin-bottom: 20px; }
        .btn-del { background: rgba(255, 82, 82, 0.1); color: var(--red); padding: 8px; font-size: 12px; }
    </style>
</head>
<body>

<!-- Sidebar Menu (Match Home) -->
<div class="hamburger" onclick="toggleMenu()">
    <span></span><span></span><span></span>
</div>
<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<nav class="sidebar" id="sidebar">
    <a href="index.html" class="nav-item">
        <span class="nav-icon">🏠</span><span>หน้าหลัก</span>
    </a>
    <a href="portfolio.html" class="nav-item">
        <span class="nav-icon">📦</span><span>สินค้า</span>
    </a>
    <a href="contact.html" class="nav-item">
        <span class="nav-icon">💬</span><span>ติดต่อเรา</span>
    </a>
    <div onclick="openAdminModal(); toggleMenu();" class="nav-item active" style="cursor: pointer;">
        <span class="nav-icon">⚙️</span><span>ตั้งค่าระบบ</span>
    </div>
</nav>

<!-- Admin Container -->
<div class="container" id="main-admin" style="display:none;">
    <div class="header-section">
        <h1>⚙️ System Management</h1>
        <p style="font-size: 12px; color: var(--dark); margin-bottom: 20px;">จัดการสต็อกและข้อมูลร้านค้า</p>
    </div>

    <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="ค้นหาชื่อสินค้า..." onkeyup="filterProducts()">
    </div>

    <div id="stock-container"></div>

    <button class="btn btn-add" onclick="addAppItem()">➕ เพิ่มสินค้าใหม่</button>
    <button class="btn btn-save" onclick="saveData()">💾 บันทึกข้อมูลทั้งหมด</button>
</div>

<!-- Login Modal -->
<div class="modal-overlay" id="loginModal">
    <div class="modal-content">
        <h3>🔐 Admin Login</h3>
        <p style="font-size: 12px; color: var(--dark); margin-bottom: 15px;">กรุณากรอกรหัสผ่านเพื่อเข้าสู่โหมดจัดการ</p>
        <input type="tel" id="adminPassInput" placeholder="••••" maxlength="4" inputmode="numeric"> 
        <div class="modal-btns">
            <button class="btn-modal btn-cancel" onclick="window.location.href='index.html'">ยกเลิก</button>
            <button class="btn-modal btn-confirm" onclick="checkAdminPass()">ตกลง</button>
        </div>
    </div>
</div>

<script>
    const PIN = "2003";

    // ฟังก์ชันเช็คสถานะ Login เมื่อโหลดหน้า
    window.onload = function() {
        if (sessionStorage.getItem("isLoggedIn") === "true") {
            unlockAdmin();
        }
    }

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
        document.querySelector('.hamburger').classList.toggle('active');
    }

    function openAdminModal() {
        document.getElementById('loginModal').style.display = 'flex';
        document.getElementById('adminPassInput').focus();
    }

    function checkAdminPass() {
        const input = document.getElementById('adminPassInput');
        if (input.value === PIN) {
            sessionStorage.setItem("isLoggedIn", "true");
            unlockAdmin();
        } else {
            alert("❌ รหัสผ่านไม่ถูกต้อง!");
            input.value = '';
        }
    }

    function unlockAdmin() {
        document.getElementById('loginModal').style.display = 'none';
        document.getElementById('main-admin').style.display = 'block';
        loadData();
    }

    function filterProducts() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        document.querySelectorAll('.stock-item').forEach(item => {
            const name = item.querySelector('.app-name').value.toLowerCase();
            item.classList.toggle('hidden', !name.includes(term));
        });
    }

    function addAppItem(name='', price='', stock='', cat='streaming', img='') {
        const container = document.getElementById('stock-container');
        const div = document.createElement('div');
        div.className = 'stock-item';
        div.innerHTML = `
            <div class="item-header">
                <div class="img-box">
                    <img src="${img || 'https://via.placeholder.com/150'}" class="img-preview" data-base64="${img}">
                    <label class="file-label">📷 <input type="file" hidden onchange="handleFile(this)"></label>
                </div>
                <div style="flex-grow:1">
                    <label>ชื่อสินค้า</label>
                    <input type="text" class="app-name" value="${name}" placeholder="ชื่อแอป...">
                </div>
            </div>
            <div class="form-grid">
                <div><label>ราคา</label><input type="number" class="app-price" value="${price}"></div>
                <div><label>สต็อก</label><input type="number" class="app-stock" value="${stock}"></div>
                <div style="grid-column: span 2">
                    <label>หมวดหมู่</label>
                    <select class="app-cat">
                        <option value="streaming" ${cat==='streaming'?'selected':''}>📺 Streaming</option>
                        <option value="working" ${cat==='working'?'selected':''}>💼 Working</option>
                        <option value="education" ${cat==='education'?'selected':''}>🎓 Education</option>
                    </select>
                </div>
            </div>
            <button class="btn btn-del" onclick="this.parentElement.remove()">🗑️ ลบ</button>
        `;
        container.appendChild(div);
    }

    function handleFile(input) {
        const reader = new FileReader();
        reader.onload = e => {
            const img = input.closest('.stock-item').querySelector('.img-preview');
            img.src = e.target.result;
            img.dataset.base64 = e.target.result;
        };
        reader.readAsDataURL(input.files[0]);
    }

    function saveData() {
        const products = [];
        document.querySelectorAll('.stock-item').forEach(item => {
            products.push({
                name: item.querySelector('.app-name').value,
                price: item.querySelector('.app-price').value,
                stock: item.querySelector('.app-stock').value,
                cat: item.querySelector('.app-cat').value,
                img: item.querySelector('.img-preview').dataset.base64
            });
        });
        const data = JSON.parse(localStorage.getItem('shopData')) || {};
        data.products = products;
        localStorage.setItem('shopData', JSON.stringify(data));
        alert('✅ บันทึกสต็อกเรียบร้อย!');
    }

    function loadData() {
        const data = JSON.parse(localStorage.getItem('shopData'));
        if(data && data.products) {
            document.getElementById('stock-container').innerHTML = '';
            data.products.forEach(p => addAppItem(p.name, p.price, p.stock, p.cat, p.img));
        }
    }

    document.getElementById('adminPassInput').addEventListener('keydown', e => {
        if(e.key === 'Enter') checkAdminPass();
    });
</script>
</body>
</html>
