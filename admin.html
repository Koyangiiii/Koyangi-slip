<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Stock Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root{ --bg:#1a1a1a; --main:#9d81e1; --dark:#d1c4e9; --white:#252525; --green:#4caf50; --red:#ff5252; --glow:rgba(157,129,225,0.3); }
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Mitr',sans-serif;}
        body { background: var(--bg); color: #fff; padding: 20px 15px 120px; display: flex; justify-content: center; }
        
        /* --- Login Modal --- */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .login-card { background: var(--white); padding: 40px 30px; border-radius: 30px; width: 90%; max-width: 360px; border: 2px solid var(--main); box-shadow: 0 0 30px var(--glow); text-align: center; }
        .login-input { width: 100%; padding: 15px; background: #1a1a1a; border: 1.5px solid #444; border-radius: 15px; color: #fff; font-size: 20px; text-align: center; outline: none; margin-bottom: 20px; -webkit-text-security: disc; }

        /* --- Main Admin Container --- */
        .admin-container { width: 100%; max-width: 480px; }
        .header-section { text-align: center; margin-bottom: 25px; }
        .header-section h1 { color: var(--main); font-size: 24px; }

        /* --- Stock Item Card --- */
        .stock-item { background: var(--white); border-radius: 22px; padding: 20px; margin-bottom: 20px; border: 1px solid #333; position: relative; box-shadow: 0 10px 20px rgba(0,0,0,0.2); transition: 0.3s; }
        .stock-item:hover { border-color: var(--main); }
        
        .item-header { display: flex; gap: 15px; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #3d3d3d; }
        .img-box { position: relative; width: 80px; height: 80px; flex-shrink: 0; }
        .img-preview { width: 100%; height: 100%; border-radius: 15px; object-fit: cover; background: #333; border: 1.5px solid var(--main); }
        .file-label { position: absolute; bottom: -5px; right: -5px; background: var(--main); width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; cursor: pointer; border: 2px solid var(--white); }
        
        .item-title-group { flex-grow: 1; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .form-group { margin-bottom: 12px; }
        .form-group.full { grid-column: span 2; }
        
        label { display: block; font-size: 12px; color: var(--dark); margin-bottom: 6px; margin-left: 5px; }
        input, select { width: 100%; padding: 12px 15px; background: #1a1a1a; border: 1px solid #444; border-radius: 12px; color: #fff; outline: none; font-size: 14px; transition: 0.3s; }
        input:focus { border-color: var(--main); }

        /* --- Buttons --- */
        .btn { border: none; border-radius: 15px; font-weight: 500; cursor: pointer; transition: 0.3s; font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-save { background: var(--main); color: white; padding: 15px; width: 100%; font-size: 16px; margin-top: 10px; border-radius: 20px; }
        .btn-add { background: #333; color: var(--main); border: 1.5px dashed var(--main); padding: 12px; width: 100%; margin-bottom: 20px; }
        .btn-del { background: rgba(255, 82, 82, 0.1); color: var(--red); padding: 8px; width: 100%; font-size: 13px; margin-top: 5px; border-radius: 12px; }
        .btn-del:hover { background: var(--red); color: white; }
        
        .preview-link { display: block; text-align: center; color: var(--dark); text-decoration: none; margin-top: 20px; font-size: 14px; opacity: 0.7; }

        /* --- Bottom Nav (ปรับให้เหมือนหน้าแรก) --- */
        .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: #252525; display: flex; justify-content: space-around; padding: 8px 0 12px; border-radius: 15px 15px 0 0; border-top: 1.5px solid var(--main); box-shadow: 0 -4px 15px rgba(0,0,0,0.4); z-index: 1000; }
        .nav-item { text-decoration: none; color: var(--dark); display: flex; flex-direction: column; align-items: center; font-size: 9px; flex: 1; transition: 0.3s; }
        .nav-item.active { color: var(--main); }
        .nav-icon { font-size: 16px; margin-bottom: 2px; }
    </style>
</head>
<body>

    <!-- Login Modal -->
    <div id="login-overlay">
        <div class="login-card">
            <h2 style="color:var(--main); margin-bottom:10px;">🔐 Admin Login</h2>
            <p style="font-size:13px; color:#888; margin-bottom:25px;">กรุณากรอกรหัสผ่านเพื่อเข้าถึงระบบสต็อก</p>
            <input type="text" id="passInput" class="login-input" placeholder="Passcode" autocomplete="off">
            <button class="btn btn-save" onclick="checkPass()">ตกลง</button>
        </div>
    </div>

    <!-- Main Content -->
    <div id="main-admin" class="admin-container" style="display:none;">
        <div class="header-section">
            <h1>📦 Stock Management</h1>
            <p style="font-size: 12px; color: var(--dark);">แก้ไขข้อมูลสินค้าและจำนวนคงเหลือที่นี่</p>
        </div>

        <div id="stock-container"></div>

        <button class="btn btn-add" onclick="addAppItem()">
            <span>➕ เพิ่มสินค้าใหม่</span>
        </button>

        <button class="btn btn-save" onclick="saveData()">
            <span>💾 บันทึกการเปลี่ยนแปลง</span>
        </button>
        
        <a href="index.html" class="preview-link">👁️ กลับไปหน้าหลักเพื่อดูผลลัพธ์</a>
    </div>

    <!-- Bottom Nav ปรับปรุงใหม่ -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <span class="nav-icon">🏠</span><span>หน้าหลัก</span>
        </a>
        <a href="portfolio.html" class="nav-item">
            <span class="nav-icon">📦</span><span>สินค้า</span>
        </a>
        <a href="contact.html" class="nav-item">
            <span class="nav-icon">💬</span><span>ติดต่อ</span>
        </a>
        <div class="nav-item active">
            <span class="nav-icon">⚙️</span><span>ตั้งค่า</span>
        </div>
    </nav>

    <script>
        const PIN = "2003";

        window.onload = function() {
            if (sessionStorage.getItem("isLoggedIn") === "true") unlockAdmin();
        }

        function checkPass() {
            const input = document.getElementById("passInput");
            if (input.value === PIN) {
                sessionStorage.setItem("isLoggedIn", "true");
                unlockAdmin();
            } else { 
                alert("❌ รหัสผ่านไม่ถูกต้อง!"); 
                input.value = "";
            }
        }

        function unlockAdmin() {
            document.getElementById("login-overlay").style.display = "none";
            document.getElementById("main-admin").style.display = "block";
            loadData();
        }

        function handleFileSelect(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const preview = input.closest('.stock-item').querySelector('.img-preview');
                    preview.src = e.target.result;
                    preview.dataset.base64 = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        }

        function addAppItem(name = '', price = '', stock = '', cat = 'streaming', imgData = '') {
            const container = document.getElementById('stock-container');
            const itemDiv = document.createElement('div');
            itemDiv.className = 'stock-item';
            const displayImg = imgData || 'https://via.placeholder.com/150';

            itemDiv.innerHTML = `
                <div class="item-header">
                    <div class="img-box">
                        <img src="${displayImg}" class="img-preview" data-base64="${imgData}">
                        <label class="file-label">
                            📷 <input type="file" accept="image/*" style="display:none" onchange="handleFileSelect(this)">
                        </label>
                    </div>
                    <div class="item-title-group">
                        <label>ชื่อแอปพรีเมียม</label>
                        <input type="text" class="app-name" placeholder="เช่น Netflix, Spotify" value="${name}">
                    </div>
                </div>
                
                <div class="form-grid">
                    <div class="form-group">
                        <label>ราคา (บาท)</label>
                        <input type="number" class="app-price" placeholder="0" value="${price}">
                    </div>
                    <div class="form-group">
                        <label>จำนวนสต็อก</label>
                        <input type="number" class="app-stock" placeholder="0" value="${stock}">
                    </div>
                    <div class="form-group full">
                        <label>หมวดหมู่สินค้า</label>
                        <select class="app-cat">
                            <option value="streaming" ${cat==='streaming'?'selected':''}>📺 Streaming</option>
                            <option value="working" ${cat==='working'?'selected':''}>💼 Working</option>
                            <option value="education" ${cat==='education'?'selected':''}>🎓 Education</option>
                        </select>
                    </div>
                </div>
                
                <button class="btn btn-del" onclick="if(confirm('ลบรายการนี้ใช่หรือไม่?')) this.closest('.stock-item').remove()">
                    🗑️ ลบรายการนี้
                </button>
            `;
            container.appendChild(itemDiv);
        }

        function saveData() {
            const appItems = [];
            document.querySelectorAll('.stock-item').forEach(item => {
                const imgPreview = item.querySelector('.img-preview');
                appItems.push({
                    name: item.querySelector('.app-name').value,
                    price: item.querySelector('.app-price').value,
                    stock: item.querySelector('.app-stock').value,
                    cat: item.querySelector('.app-cat').value,
                    img: imgPreview.dataset.base64 || ''
                });
            });

            let existingData = JSON.parse(localStorage.getItem('shopData')) || {};
            existingData.products = appItems;

            try {
                localStorage.setItem('shopData', JSON.stringify(existingData));
                alert('✅ บันทึกสต็อกเรียบร้อยแล้ว!');
            } catch (e) {
                alert('❌ พื้นที่เต็ม! กรุณาลดขนาดไฟล์รูปภาพ หรือใช้ลิงก์รูปภาพแทน');
            }
        }

        function loadData() {
            const savedData = JSON.parse(localStorage.getItem('shopData'));
            if(savedData && savedData.products) {
                document.getElementById('stock-container').innerHTML = '';
                savedData.products.forEach(p => addAppItem(p.name, p.price, p.stock, p.cat, p.img));
            }
        }
    </script>
</body>
</html>
