<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium App Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root{ --bg:#1a1a1a; --main:#9d81e1; --dark:#d1c4e9; --white:#252525; --glow:rgba(157,129,225,0.3); --green:#4caf50; --red:#ff5252; }
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Mitr',sans-serif;}
        body{background:var(--bg);display:flex;justify-content:center;color:#efefef;}

        .container{ max-width:500px; width:100%; padding:20px 15px 100px; }
        .section{background:var(--white);border-radius:20px;padding:25px 20px;margin-bottom:20px;box-shadow:0 8px 20px rgba(0,0,0,0.3);border:2px solid var(--main);}
        h1,h2,h3{color:var(--main);}
        .center{text-align:center;}
        
        .logo{width:120px;height:120px;border-radius:30px;overflow:hidden;margin:0 auto 20px;box-shadow:0 6px 20px var(--glow);border:2px solid var(--main);}
        .logo img{width:100%;height:100%;object-fit:cover;}

        /* --- Category Grouping Styles --- */
        .cat-group { margin-bottom: 25px; }
        .cat-title { font-size: 16px; color: var(--main); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; border-bottom: 1px dashed #444; padding-bottom: 5px; }
        
        .app-item { display: flex; align-items: center; background: #2d2d2d; padding: 15px; border-radius: 18px; margin-bottom: 12px; border: 1px solid transparent; transition: 0.3s; }
        .app-icon { width: 55px; height: 55px; border-radius: 12px; margin-right: 15px; background: #3d3d3d; display: flex; align-items: center; justify-content: center; font-size: 24px; overflow: hidden; }
        .app-icon img { width: 100%; height: 100%; object-fit: cover; }
        .app-info { flex-grow: 1; }
        .app-name { font-weight: 500; font-size: 15px; color: #fff; display: block; }
        .app-price { color: var(--main); font-size: 14px; font-weight: bold; }
        .stock-tag { font-size: 11px; color: var(--green); margin-top: 2px; }
        
        .out-of-stock { opacity: 0.6; filter: grayscale(0.8); }
        .out-of-stock .stock-tag { color: var(--red); }
        .btn-buy { background: var(--main); color: #fff; padding: 6px 15px; border-radius: 20px; text-decoration: none; font-size: 13px; font-weight: 500; }
        .btn-out { background: #555; }

        .btn-main{display:block;text-align:center;padding:14px;border-radius:25px;text-decoration:none;margin-top:15px;font-weight:500; background:var(--main);color:#fff;}
        .small{font-size:12px;opacity:.7;margin-top:10px;color:var(--dark);white-space: pre-line;}

        .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 450px; background: #252525; display: flex; justify-content: space-around; padding: 8px 0 12px; border-radius: 15px 15px 0 0; border-top: 1.5px solid var(--main); z-index: 1000; }
        .nav-item { text-decoration: none; color: var(--dark); display: flex; flex-direction: column; align-items: center; font-size: 9px; cursor: pointer; flex: 1; }
        .nav-item.active { color: var(--main); }

        /* --- Login Modal --- */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); display: none; justify-content: center; align-items: center; z-index: 2000; padding: 20px; }
        .modal-content { background: var(--white); border: 2px solid var(--main); border-radius: 25px; padding: 30px; width: 100%; max-width: 350px; text-align: center; }
        .modal-content input { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #444; background: #333; color: #fff; text-align: center; font-size: 18px; margin-bottom: 20px; outline: none; }
        .modal-btns { display: flex; gap: 10px; }
        .btn-modal { flex: 1; padding: 12px; border-radius: 15px; border: none; cursor: pointer; font-family: 'Mitr'; }
        .btn-confirm { background: var(--main); color: #fff; }
        .btn-cancel { background: #444; color: #ccc; }
    </style>
</head>
<body>

<div class="container">
    <div class="section center" style="border:none;box-shadow:none;background:transparent;">
        <div class="logo"><img src="https://via.placeholder.com/150" alt="logo" id="disp-logo"></div>
        <h1 id="disp-name">Premium Store</h1>
        <p id="disp-slogan" style="color:var(--dark);opacity:.8;margin:5px 0 15px;">แหล่งรวมแอปพรีเมียม ราคาถูก พร้อมประกัน</p>
    </div>

    <div class="section">
        <h2 style="margin-bottom: 20px; font-size: 18px;">🔥 รายการสินค้า</h2>
        <div id="app-list-container">
            <!-- สินค้าจะถูกแยกหมวดหมู่มาแสดงที่นี่ -->
        </div>
    </div>

    <div class="section">
        <h2>📍 เงื่อนไขการรับประกัน</h2>
        <p id="disp-rules" class="small"></p>
        <a id="link-line-btn" href="#" class="btn-main">แจ้งปัญหา / สอบถามเพิ่มเติม 💬</a>
    </div>
</div>

<nav class="bottom-nav">
    <a href="index.html" class="nav-item active">🏠<br>หน้าหลัก</a>
    <a href="portfolio.html" class="nav-item">📦<br>สินค้า</a>
    <a href="contact.html" class="nav-item">💬<br>ติดต่อ</a>
    <div onclick="openAdminModal()" class="nav-item">⚙️<br>ตั้งค่า</div>
</nav>

<div class="modal-overlay" id="loginModal">
    <div class="modal-content">
        <h3>🔐 Admin Login</h3>
        <p style="font-size: 12px; color: var(--dark); margin-bottom: 15px;">กรุณากรอกรหัสผ่านเพื่อเข้าสู่โหมดจัดการ</p>
        <input type="text" id="adminPassInput" autocomplete="off" style="-webkit-text-security: disc;"> 
        <div class="modal-btns">
            <button class="btn-modal btn-cancel" onclick="closeModal()">ยกเลิก</button>
            <button class="btn-modal btn-confirm" onclick="checkAdminPass()">ตกลง</button>
        </div>
    </div>
</div>

<script>
    const PIN = "2003";

    // กำหนดชื่อหมวดและไอคอน
    const categories = [
        { id: 'streaming', title: 'Streaming Apps', icon: '📺' },
        { id: 'working', title: 'Working Tools', icon: '💼' },
        { id: 'education', title: 'Education', icon: '🎓' }
    ];

    const savedData = JSON.parse(localStorage.getItem('shopData'));
    
    if(savedData) {
        document.getElementById('disp-name').innerText = savedData.name || "Premium Store";
        document.getElementById('disp-rules').innerText = savedData.rules || "";
        document.getElementById('link-line-btn').href = savedData.line || '#';
        
        const container = document.getElementById('app-list-container');
        container.innerHTML = '';

        // วนลูปตามหมวดหมู่ที่เรากำหนดไว้
        categories.forEach(cat => {
            const catItems = savedData.products.filter(p => p.cat === cat.id);
            
            // แสดงเฉพาะหมวดที่มีสินค้าเท่านั้น
            if(catItems.length > 0) {
                let catHtml = `
                    <div class="cat-group">
                        <div class="cat-title">${cat.icon} ${cat.title}</div>
                        <div class="cat-items-list">
                `;

                catItems.forEach(product => {
                    const isOut = parseInt(product.stock) <= 0;
                    let displayImg = product.img ? `<img src="${product.img}">` : '🎬';
                    catHtml += `
                        <div class="app-item ${isOut ? 'out-of-stock' : ''}">
                            <div class="app-icon">${displayImg}</div>
                            <div class="app-info">
                                <span class="app-name">${product.name}</span>
                                <span class="app-price">${product.price}.-</span>
                                <div class="stock-tag">${isOut ? '❌ หมด' : '✅ สต็อก: ' + product.stock}</div>
                            </div>
                            <a href="${isOut ? '#' : savedData.line}" class="btn-buy ${isOut ? 'btn-out' : ''}">${isOut ? 'หมด' : 'สั่งซื้อ'}</a>
                        </div>`;
                });

                catHtml += `</div></div>`;
                container.innerHTML += catHtml;
            }
        });

        if(container.innerHTML === '') {
            container.innerHTML = '<p style="text-align:center; color:#888;">ยังไม่มีสินค้าในขณะนี้</p>';
        }
    }

    // --- Admin Functions ---
    function openAdminModal() { document.getElementById('loginModal').style.display = 'flex'; }
    function closeModal() { document.getElementById('loginModal').style.display = 'none'; }
    function checkAdminPass() {
        if (document.getElementById('adminPassInput').value === PIN) {
            sessionStorage.setItem("isLoggedIn", "true");
            window.location.href = "admin.html";
        } else { alert("❌ รหัสผิด!"); }
    }
</script>
</body>
</html>
