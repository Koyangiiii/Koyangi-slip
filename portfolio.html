<div class="modal-overlay" id="loginModal">
    <div class="modal-content">
        <h3>🔐 Admin Login</h3>
        <p style="font-size: 12px; color: var(--dark); margin-bottom: 15px;">กรุณากรอกรหัสผ่านเพื่อเข้าสู่โหมดจัดการ</p>
        
        <!-- แก้ไขตรงนี้: เพิ่ม placeholder="..." และเปลี่ยน type เพื่อให้พิมพ์ง่ายขึ้น -->
        <input type="tel" id="adminPassInput" 
               placeholder="...." 
               maxlength="4" 
               inputmode="numeric" 
               autocomplete="off"
               style="text-align: center; font-size: 24px; letter-spacing: 10px;"> 

        <div class="modal-btns">
            <button class="btn-modal btn-cancel" onclick="closeModal()">ยกเลิก</button>
            <button class="btn-modal btn-confirm" onclick="checkAdminPass()">ตกลง</button>
        </div>
    </div>
</div>
