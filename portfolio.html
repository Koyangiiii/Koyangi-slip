<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koyangi App Store - สินค้าทั้งหมด</title>
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root{ --bg:#1a1a1a; --main:#9d81e1; --dark:#d1c4e9; --white:#252525; --glow:rgba(157,129,225,0.3); --green:#4caf50; --red:#ff5252; }
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Mitr',sans-serif;}
        body{background:var(--bg);display:flex;justify-content:center;color:#efefef;}

        .container{ max-width:500px; width:100%; padding:20px 15px 100px; }
        .section{background:var(--white);border-radius:20px;padding:25px 20px;margin-bottom:20px;box-shadow:0 8px 20px rgba(0,0,0,0.3);border:2px solid var(--main);}
        h1,h2,h3{color:var(--main);}
        .center{text-align:center;}
        
        .logo{width:120px;height:120px;border-radius:30px;overflow:hidden;margin:0 auto 20px;box-shadow:0 6px 20px var(--glow);border:2px solid var(--main);}
        .logo img{width:100%;height:100%;object-fit:cover;}

        /* --- 🍔 Hamburger Menu --- */
        .hamburger {
            position: fixed; top: 20px; right: 20px; z-index: 1100;
            background: var(--main); width: 45px; height: 45px; border-radius: 12px;
            display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 5px;
            cursor: pointer; box-shadow: 0 4px 15px var(--glow); transition: 0.3s;
        }
        .hamburger span { width: 25px; height: 3px; background: #fff; border-radius: 2px; transition: 0.3s ease-in-out; display: block; }
        .hamburger.active span:nth-child(1) { transform: translateY(8px) rotate(45deg); }
        .hamburger.active span:nth-child(2) { opacity: 0; transform: translateX(20px); }
        .hamburger.active span:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }

        .sidebar {
            position: fixed; top: 0; right: -280px; width: 280px; height: 100%;
            background: #252525; z-index: 1050; padding: 80px 20px 20px;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: -5px 0 25px rgba(0,0,0,0.5); border-left: 2px solid var(--main);
        }
        .sidebar.active { right: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 999; backdrop-filter: blur(3px); }
        .overlay.active { display: block; }

        .nav-item { text-decoration: none; color: var(--dark); display: flex; align-items: center; padding: 15px 20px; margin-bottom: 10px; border-radius: 15px; font-size: 16px; transition: 0.3s; gap: 15px; }
        .nav-item:hover, .nav-item.active { background: rgba(157, 129, 225, 0.1); color: var(--main); }

        /* --- Category & App List --- */
        .cat-group { margin-bottom: 25px; }
        .cat-title { font-size: 16px; color: var(--main); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; border-bottom: 1px dashed #444; padding-bottom: 5px; }
        
        /* สไตล์หมวดหมู่ย่อย (ชื่อแอป) */
        .sub-cat-group {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 15px;
            padding: 12px;
            margin-bottom: 15px;
            border-left: 3px solid var(--main);
        }
        .sub-cat-name {
            font-size: 14px;
            color: var(--dark);
            margin: 0 0 10px 5px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* สไตล์รายการสินค้า (แพ็กเกจ) */
        .app-item { display: flex; align-items: center; background: #2d2d2d; padding: 12px; border-radius: 15px; margin-bottom: 8px; border: 1px solid transparent; transition: 0.3s; }
        .app-icon { width: 40px; height: 40px; border-radius: 10px; margin-right: 12px; background: #3d3d3d; display: flex; align-items: center; justify-content: center; font-size: 18px; overflow: hidden; flex-shrink: 0; }
        .app-icon img { width: 100%; height: 100%; object-fit: cover; }
        .app-info { flex-grow: 1; }
        .app-name { font-weight: 400; font-size: 13px; color: #fff; }
        .app-price { color: var(--main); font-size: 13px; font-weight: bold; }
        .stock-tag { font-size: 11px; color: var(--green); margin-left: 5px; font-weight: normal; }
        
        .out-of-stock { opacity: 0.6; filter: grayscale(0.8); }
        .out-of-stock .stock-tag { color: var(--red); }
        
        .btn-buy { background: var(--main); color: #fff; padding: 5px 15px; border-radius: 20px; text-decoration: none; font-size: 11px; font-weight: 500; }
        .btn-main{display:block;text-align:center;padding:14px;border-radius:25px;text-decoration:none;margin-top:15px;font-weight:500; background:var(--main);color:#fff;}
        .small{font-size:12px;opacity:.7;margin-top:10px;color:var(--dark);white-space: pre-line;}

        /* Admin Login Modal */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); display: none; justify-content: center; align-items: center; z-index: 2000; padding: 20px; }
        .modal-content { background: var(--white); border: 2px solid var(--main); border-radius: 25px; padding: 30px; width: 100%; max-width: 350px; text-align: center; box-shadow: 0 10px 40px var(--glow); }
        #adminPassInput { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #444; background: #333; color: var(--main); text-align: center; font-size: 24px; letter-spacing: 10px; margin-bottom: 20px; outline: none; -webkit-text-security: disc; }
        .modal-btns { display: flex; gap: 10px; }
        .btn-modal { flex: 1; padding: 12px; border-radius: 15px; border: none; cursor: pointer; font-family: 'Mitr'; font-weight: 500; }
        .btn-confirm { background: var(--main); color: #fff; }
        .btn-cancel { background: #444; color: #ccc; }
    </style>
</head>
<body>

<div class="hamburger" onclick="toggleMenu()">
    <span></span><span></span><span></span>
</div>
<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<nav class="sidebar" id="sidebar">
    <a href="index.html" class="nav-item">
        <span class="nav-icon">🏠</span><span>หน้าหลัก</span>
    </a>
    <a href="portfolio.html" class="nav-item active">
        <span class="nav-icon">📦</span><span>สินค้า</span>
    </a>
    <a href="contact.html" class="nav-item">
        <span class="nav-icon">💬</span><span>ติดต่อเรา</span>
    </a>
    <div onclick="openAdminModal(); toggleMenu();" class="nav-item" style="cursor:pointer;">
        <span class="nav-icon">⚙️</span><span>ตั้งค่าระบบ</span>
    </div>
</nav>

<div class="container">
    <div class="section center" style="border:none;box-shadow:none;background:transparent; padding-top: 10px;">
        <div class="logo"><img src="https://via.placeholder.com/150" alt="logo" id="disp-logo"></div>
        <h1 id="disp-name">Premium Store</h1>
        <p id="disp-slogan" style="color:var(--dark);opacity:.8;margin:5px 0 15px;">รายการสินค้าทั้งหมดแบ่งตามหมวดหมู่</p>
    </div>

    <div class="section">
        <h2 style="margin-bottom: 20px; font-size: 18px;">🔥 หมวดหมู่สินค้า</h2>
        <div id="app-list-container">
            <p style="text-align:center; font-size:14px; color:#888;">กำลังโหลดสินค้า...</p>
        </div>
    </div>

    <div class="section">
        <h2>📍 เงื่อนไขการรับประกัน</h2>
        <p id="disp-rules" class="small"></p>
        <a id="link-line-btn" href="#" class="btn-main">แจ้งปัญหา / สอบถามเพิ่มเติม 💬</a>
    </div>
</div>

<div class="modal-overlay" id="loginModal">
    <div class="modal-content">
        <h3>🔐 Admin Login</h3>
        <p style="font-size: 12px; color: var(--dark); margin-bottom: 15px;">กรุณากรอกรหัสผ่านเพื่อเข้าสู่โหมดจัดการ</p>
        <input type="tel" id="adminPassInput" placeholder="••••" maxlength="4" inputmode="numeric"> 
        <div class="modal-btns">
            <button class="btn-modal btn-cancel" onclick="closeModal()">ยกเลิก</button>
            <button class="btn-modal btn-confirm" onclick="checkAdminPass()">ตกลง</button>
        </div>
    </div>
</div>

<script>
    const PIN = "2003";

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
        document.querySelector('.hamburger').classList.toggle('active');
    }

    function openAdminModal() { 
        sessionStorage.removeItem("isLoggedIn");
        document.getElementById('loginModal').style.display = 'flex'; 
        const input = document.getElementById('adminPassInput');
        input.value = '';
        setTimeout(() => { input.focus(); }, 200);
    }

    function closeModal() { document.getElementById('loginModal').style.display = 'none'; }

    function checkAdminPass() {
        const input = document.getElementById('adminPassInput');
        if (input.value === PIN) {
            sessionStorage.setItem("isLoggedIn", "true");
            window.location.href = "admin.html";
        } else { 
            alert("❌ รหัสผ่านไม่ถูกต้อง!"); 
            input.value = ''; 
            input.focus();
        }
    }

    const categories = [
        { id: 'streaming', title: 'Streaming Apps', icon: '📺' },
        { id: 'working', title: 'Working Tools', icon: '💼' },
        { id: 'education', title: 'Education', icon: '🎓' }
    ];

    function loadContent() {
        const savedData = JSON.parse(localStorage.getItem('shopData'));
        if(!savedData) return;

        document.getElementById('disp-name').innerText = savedData.name || "Premium Store";
        document.getElementById('disp-rules').innerText = savedData.rules || "";
        document.getElementById('link-line-btn').href = savedData.line || '#';
        if(savedData.logo) document.getElementById('disp-logo').src = savedData.logo;
        
        const container = document.getElementById('app-list-container');
        container.innerHTML = '';

        categories.forEach(cat => {
            const catItems = (savedData.products || []).filter(p => p.cat === cat.id);
            
            if(catItems.length > 0) {
                let catHtml = `<div class="cat-group"><div class="cat-title">${cat.icon} ${cat.title}</div>`;
                
                // --- จัดกลุ่มตามชื่อแอป (subCat) ---
                const grouped = catItems.reduce((acc, item) => {
                    const groupName = item.subCat || 'ทั่วไป';
                    if (!acc[groupName]) acc[groupName] = [];
                    acc[groupName].push(item);
                    return acc;
                }, {});

                for (const subCatName in grouped) {
                    catHtml += `<div class="sub-cat-group">
                                    <div class="sub-cat-name">📦 ${subCatName}</div>`;
                    
                    grouped[subCatName].forEach(product => {
                        const isOut = parseInt(product.stock) <= 0;
                        let displayImg = product.img ? `<img src="${product.img}">` : '🎬';
                        catHtml += `
                            <div class="app-item ${isOut ? 'out-of-stock' : ''}" style="background: #333;">
                                <div class="app-icon">${displayImg}</div>
                                <div class="app-info">
                                    <div class="app-name">${product.name}</div>
                                    <div class="app-price">
                                        ${product.price}.- 
                                        <span class="stock-tag">${isOut ? '(หมด)' : 'คลัง: '+product.stock}</span>
                                    </div>
                                </div>
                                <a href="${isOut ? '#' : savedData.line}" class="btn-buy">${isOut ? 'หมด' : 'ซื้อ'}</a>
                            </div>`;
                    });
                    catHtml += `</div>`;
                }
                catHtml += `</div>`;
                container.innerHTML += catHtml;
            }
        });
    }

    document.getElementById('adminPassInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') checkAdminPass();
    });

    window.onload = loadContent;
</script>
</body>
</html>
