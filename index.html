<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium App Store - All in One</title>
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root{ --bg:#1a1a1a; --main:#9d81e1; --dark:#d1c4e9; --white:#252525; --glow:rgba(157,129,225,0.3); --green:#4caf50; --red:#ff5252; }
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Mitr',sans-serif;}
        body{background:var(--bg);display:flex;justify-content:center;color:#efefef;min-height: 100vh;}
        .container{ max-width:500px; width:100%; padding:20px 15px 100px; }

        /* การจัดการหน้า (View Management) */
        .page-view { display: none; }
        .page-view.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }

        /* UI ส่วนกลาง */
        .section{background:var(--white);border-radius:20px;padding:25px 20px;margin-bottom:20px;box-shadow:0 8px 20px rgba(0,0,0,0.3);border:2px solid var(--main);}
        h1,h2,h3{color:var(--main);}
        .center{text-align:center;}
        .btn-main{display:block;text-align:center;padding:14px;border-radius:25px;text-decoration:none;margin-top:15px;font-weight:500; background:var(--main);color:#fff; border:none; width:100%; cursor:pointer;}
        
        /* สไตล์หน้าหลัก (Home) */
        .app-item { display: flex; align-items: center; background: #2d2d2d; padding: 15px; border-radius: 18px; margin-bottom: 12px; border: 1px solid transparent; transition: 0.3s; }
        .app-icon { width: 50px; height: 50px; border-radius: 12px; margin-right: 15px; background: #3d3d3d; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .app-info { flex-grow: 1; }
        .app-name { font-weight: 500; font-size: 16px; color: #fff; }
        .app-price { color: var(--main); font-size: 14px; font-weight: bold; }
        .stock-tag { font-size: 11px; margin-top: 2px; }
        .btn-buy { background: var(--main); color: #fff; padding: 6px 15px; border-radius: 20px; text-decoration: none; font-size: 13px; font-weight: 500; }
        .out-of-stock { opacity: 0.5; filter: grayscale(1); }

        /* สไตล์หน้า Admin */
        .form-group { margin-bottom: 15px; text-align: left; }
        label { display: block; font-size: 13px; margin-bottom: 5px; color: var(--dark); }
        input, textarea, select { width: 100%; padding: 12px; background: #333; border: 1px solid #444; border-radius: 10px; color: #fff; font-family: inherit; outline: none; }
        .stock-item { background: #1e1e1e; padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px dashed var(--main); }
        .del-btn { background: var(--red); color:#fff; border:none; padding:5px 10px; border-radius:10px; font-size:12px; margin-top:10px; cursor:pointer;}

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 500px; background: #252525; display: flex; justify-content: space-around; padding: 12px 0; border-top: 2px solid var(--main); z-index: 1000; }
        .nav-item { text-decoration: none; color: var(--dark); display: flex; flex-direction: column; align-items: center; font-size: 11px; cursor: pointer; border: none; background: none; flex: 1; }
        .nav-item.active { color: var(--main); }
        .nav-icon { font-size: 20px; margin-bottom: 4px; }
    </style>
</head>
<body>

<div class="container">
    
    <!-- 1. หน้าหลัก (HOME VIEW) -->
    <div id="view-home" class="page-view active">
        <div class="center" style="padding-top: 10px; margin-bottom: 25px;">
            <h1 id="disp-name">Premium Store</h1>
            <p id="disp-slogan" style="color:var(--dark); opacity:.8; font-size: 14px;">แหล่งรวมแอปราคาถูก</p>
        </div>

        <div class="section">
            <h2 style="margin-bottom: 15px; font-size: 18px;">🔥 สินค้าทั้งหมด</h2>
            <div id="app-list-container"></div>
        </div>

        <div class="section">
            <h2>📍 เงื่อนไขการรับประกัน</h2>
            <p id="disp-rules" style="font-size:12px; color:var(--dark); white-space: pre-line; margin-top:10px;"></p>
            <a id="link-line-btn" href="#" class="btn-main">สอบถามเพิ่มเติม 💬</a>
        </div>
    </div>

    <!-- 2. หน้าแอดมิน (ADMIN VIEW) -->
    <div id="view-admin" class="page-view">
        <div id="admin-login-sec">
            <div class="section center">
                <h2>🔐 Admin Login</h2>
                <div class="form-group" style="margin-top:20px;">
                    <input type="password" id="passInput" placeholder="กรอกรหัสผ่าน (2003)">
                </div>
                <button class="btn-main" onclick="checkPass()">เข้าสู่ระบบ</button>
            </div>
        </div>

        <div id="admin-content-sec" style="display:none;">
            <div class="section">
                <h2>🏠 ตั้งค่าร้านค้า</h2>
                <div class="form-group"><label>ชื่อร้าน</label><input type="text" id="edit-name"></div>
                <div class="form-group"><label>คำโปรย</label><input type="text" id="edit-slogan"></div>
                <div class="form-group"><label>ลิงก์ LINE</label><input type="text" id="edit-line"></div>
                <div class="form-group"><label>กฎของร้าน</label><textarea id="edit-rules" rows="3"></textarea></div>
            </div>

            <div class="section">
                <h2>📦 จัดการสต็อก</h2>
                <div id="edit-stock-list"></div>
                <button class="btn-main" style="background:var(--green);" onclick="addNewItemForm()">➕ เพิ่มแอปใหม่</button>
                <button class="btn-main" onclick="saveAllData()">💾 บันทึกและอัปเดตหน้าหลัก</button>
            </div>
        </div>
    </div>

</div>

<!-- BOTTOM NAVIGATION -->
<nav class="bottom-nav">
    <div class="nav-item active" onclick="switchView('home')">
        <span class="nav-icon">🏠</span><span>หน้าหลัก</span>
    </div>
    <div class="nav-item" onclick="switchView('admin')">
        <span class="nav-icon">⚙️</span><span>ตั้งค่า</span>
    </div>
</nav>

<script>
    // --- สลับหน้า (View Switcher) ---
    function switchView(viewName) {
        document.querySelectorAll('.page-view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        
        document.getElementById('view-' + viewName).classList.add('active');
        event.currentTarget.classList.add('active');
        
        if(viewName === 'home') loadHome();
    }

    // --- ระบบ Admin ---
    const PIN = "2003";
    function checkPass() {
        if(document.getElementById('passInput').value === PIN) {
            document.getElementById('admin-login-sec').style.display = 'none';
            document.getElementById('admin-content-sec').style.display = 'block';
            prepareAdminForm();
        } else { alert("รหัสผ่านไม่ถูกต้อง!"); }
    }

    function addNewItemForm(name='', price='', stock='', cat='streaming') {
        const container = document.getElementById('edit-stock-list');
        const div = document.createElement('div');
        div.className = 'stock-item';
        div.innerHTML = `
            <div class="form-group"><label>ชื่อแอป</label><input type="text" class="stk-name" value="${name}"></div>
            <div style="display:flex; gap:10px;">
                <div class="form-group"><label>ราคา</label><input type="number" class="stk-price" value="${price}"></div>
                <div class="form-group"><label>สต็อก</label><input type="number" class="stk-stock" value="${stock}"></div>
            </div>
            <div class="form-group">
                <label>หมวดหมู่</label>
                <select class="stk-cat">
                    <option value="streaming" ${cat=='streaming'?'selected':''}>Streaming</option>
                    <option value="working" ${cat=='working'?'selected':''}>Working</option>
                    <option value="education" ${cat=='education'?'selected':''}>Education</option>
                </select>
            </div>
            <button class="del-btn" onclick="this.parentElement.remove()">ลบรายการนี้</button>
        `;
        container.appendChild(div);
    }

    function saveAllData() {
        const products = [];
        document.querySelectorAll('.stock-item').forEach(el => {
            products.push({
                name: el.querySelector('.stk-name').value,
                price: el.querySelector('.stk-price').value,
                stock: el.querySelector('.stk-stock').value,
                cat: el.querySelector('.stk-cat').value
            });
        });

        const shopData = {
            name: document.getElementById('edit-name').value,
            slogan: document.getElementById('edit-slogan').value,
            line: document.getElementById('edit-line').value,
            rules: document.getElementById('edit-rules').value,
            products: products
        };

        localStorage.setItem('shopData', JSON.stringify(shopData));
        alert("บันทึกข้อมูลสำเร็จ! หน้าหลักอัปเดตแล้ว");
        switchView('home');
    }

    // --- ระบบโหลดข้อมูลหน้าหลัก ---
    function loadHome() {
        const data = JSON.parse(localStorage.getItem('shopData'));
        if(!data) return;

        document.getElementById('disp-name').innerText = data.name || "Premium Store";
        document.getElementById('disp-slogan').innerText = data.slogan || "";
        document.getElementById('disp-rules').innerText = data.rules || "";
        document.getElementById('link-line-btn').href = data.line || "#";

        const container = document.getElementById('app-list-container');
        container.innerHTML = '';

        (data.products || []).forEach(p => {
            const isOut = parseInt(p.stock) <= 0;
            let icon = p.cat === 'streaming' ? '🎬' : (p.cat === 'working' ? '💼' : '📚');
            
            container.innerHTML += `
                <div class="app-item ${isOut ? 'out-of-stock' : ''}">
                    <div class="app-icon">${icon}</div>
                    <div class="app-info">
                        <span class="app-name">${p.name}</span>
                        <span class="app-price">${p.price}.-</span>
                        <div class="stock-tag" style="color:${isOut ? 'var(--red)' : 'var(--green)'}">
                            ${isOut ? '❌ สินค้าหมด' : '✅ คงเหลือ ' + p.stock + ' ชิ้น'}
                        </div>
                    </div>
                    <a href="${isOut ? '#' : data.line}" class="btn-buy">${isOut ? 'หมด' : 'สั่งซื้อ'}</a>
                </div>
            `;
        });
    }

    function prepareAdminForm() {
        const data = JSON.parse(localStorage.getItem('shopData'));
        if(!data) return;
        document.getElementById('edit-name').value = data.name || "";
        document.getElementById('edit-slogan').value = data.slogan || "";
        document.getElementById('edit-line').value = data.line || "";
        document.getElementById('edit-rules').value = data.rules || "";
        
        const container = document.getElementById('edit-stock-list');
        container.innerHTML = '';
        (data.products || []).forEach(p => addNewItemForm(p.name, p.price, p.stock, p.cat));
    }

    window.onload = loadHome;
</script>

</body>
</html>
