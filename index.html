<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>𝐊𝐨𝐲𝐚𝐧𝐠𝐢 𝜗𝜚˚⋆ - Official</title>

<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root{
--bg:#1a1a1a; 
--main:#9d81e1;
--dark:#d1c4e9;
--white:#252525;
--glow:rgba(157,129,225,0.3);
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Mitr',sans-serif;}

body{
background:var(--bg);
display:flex;
justify-content:center;
color:#efefef;
}

.container{
max-width:500px;
width:100%;
padding:20px 15px 40px;
}

.section{
background:var(--white);
border-radius:20px;
padding:25px 20px;
margin-bottom:20px;
box-shadow:0 8px 20px rgba(0,0,0,0.3);
border:2px solid var(--main);
}

h1,h2,h3{color:var(--main);}
.center{text-align:center;}

.logo{
width:150px;height:150px;
border-radius:50%;
overflow:hidden;
margin:0 auto 20px;
box-shadow:0 6px 20px var(--glow);
border: 3px solid var(--main);
}

.logo img{width:100%;height:100%;object-fit:cover;}

.badges{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
margin-bottom:20px;
}

.badge{
background:#333;
padding:8px 16px;
border-radius:25px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
font-size:13px;
color:var(--dark);
border: 1px solid var(--main);
}

/* เพิ่ม Style สำหรับ Input ให้กรอกข้อมูลได้ */
input.edit-inline, textarea.edit-inline {
    background: transparent;
    border: none;
    color: inherit;
    font-family: inherit;
    font-size: inherit;
    width: 100%;
    text-align: inherit;
    outline: none;
    border-bottom: 1px dashed rgba(157,129,225,0.2);
}
textarea.edit-inline { resize: none; height: auto; }

.btn{
display:block;
text-align:center;
padding:14px;
border-radius:25px;
text-decoration:none;
margin-top:15px;
font-weight:500;
transition: 0.3s;
cursor: pointer;
}

.btn-outline{
background:transparent;
border:2px dashed var(--main);
color:var(--main);
}

.btn-main{
background:var(--main);
color:#fff;
border: none;
width: 100%;
}

.step{
display:flex;
align-items:center;
gap:12px;
margin-bottom:12px;
}

.step-num{
background:var(--main);
color:#fff;
width:26px;height:26px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:13px;
flex-shrink: 0;
}

.price-row{
display:flex;
justify-content:space-between;
margin-bottom:10px;
background:#2d2d2d;
padding:10px 15px;
border-radius:15px;
border-left: 4px solid var(--main);
}

.price-tag{
background:var(--main);
color:#fff;
padding:3px 12px;
border-radius:20px;
font-size:14px;
}

.footer{
text-align:center;
margin-top:30px;
}

.socials{
display:flex;
gap:8px;
justify-content:center;
margin-top:15px;
}

.socials a{
flex:1;
max-width:100px;
text-align:center;
padding:8px;
border-radius:25px;
background:#333;
text-decoration:none;
color:var(--dark);
font-size:13px;
border:1px solid var(--main);
}

.small{font-size:12px;opacity:.7;margin-top:10px;color:var(--dark);}
</style>
</head>

<body>
<div class="container">

<!-- ====== HEADER (แก้ไขชื่อร้าน/คำโปรย) ====== -->
<div class="section center" style="border:none;box-shadow:none;background:transparent;">

<div class="logo">
<img src="logo.jpg" alt="logo">
</div>

<h1><input type="text" class="edit-inline" value="𝐊𝐨𝐲𝐚𝐧𝐠𝐢 𝜗𝜚˚⋆"></h1>
<p style="color:var(--dark);opacity:.8;margin:10px 0 20px;">
<input type="text" class="edit-inline" value="รับออกแบบป้าย ลายน้ำ Google Sheet เว็บไซต์⭐️">
</p>

<!-- ส่วน Badges คงไว้ 100% -->
<div class="badges">
<div class="badge"><input type="text" class="edit-inline" style="width:80px" value="🎨 ป้าย/โลโก้"></div>
<div class="badge"><input type="text" class="edit-inline" style="width:100px" value="📊 Google Sheet"></div>
<div class="badge"><input type="text" class="edit-inline" style="width:80px" value="🌐 Website"></div>
</div>

<!-- ปุ่มเช็คคิวงานแบบเส้นประ คงไว้ 100% -->
<a href="#" class="btn btn-outline">
<input type="text" class="edit-inline" style="color:var(--main)" value="เช็คคิวงาน/สอบถาม ✨">
</a>
</div>

<!-- ====== ขั้นตอน (แก้ไขเนื้อหาได้) ====== -->
<div class="section">
<h2>📋 <input type="text" class="edit-inline" style="width:80%;" value="ขั้นตอนการสั่ง"></h2>

<div class="step"><div class="step-num">1</div><div><input type="text" class="edit-inline" value="กรอกฟอร์ม เขียนรายละเอียดร้านค้า"></div></div>
<div class="step"><div class="step-num">2</div><div><input type="text" class="edit-inline" value="ใส่ลิงก์ตัวอย่างงาน/แนบโลโก้"></div></div>
<div class="step"><div class="step-num">3</div><div><input type="text" class="edit-inline" value="ส่งงานให้เช็ค แจ้งยอด ชำระเงิน"></div></div>
<div class="step"><div class="step-num">4</div><div><input type="text" class="edit-inline" value="รอรับลิงก์ได้เลยค่า"></div></div>

<a href="#" class="btn btn-main">⭐ <input type="text" class="edit-inline" style="width:150px; color:#fff;" value="ดูตัวอย่างงานทั้งหมด"></a>
</div>

<!-- ====== รายละเอียด/เงื่อนไข (แก้ไขเนื้อหาได้) ====== -->
<div class="section">
<h2>📍 <input type="text" class="edit-inline" style="width:80%;" value="กฎของร้าน & เงื่อนไข"></h2>

<div class="price-row">
    <span><input type="text" class="edit-inline" value="ระยะเวลารองาน"></span>
    <span class="price-tag"><input type="text" class="edit-inline" style="width:60px; color:#fff;" value="4-8 ชม."></span>
</div>
<div class="price-row">
    <span><input type="text" class="edit-inline" value="งานเร่งด่วน"></span>
    <span class="price-tag"><input type="text" class="edit-inline" style="width:80px; color:#fff;" value="*2 ของราคา"></span>
</div>

<div style="margin-top:15px;">
<textarea class="edit-inline small" rows="4" style="text-align:left;">
• โอนเงินแล้วไม่คืนเงินทุกกรณี
• ยกเลิกหลังเริ่มงาน คืนเงิน 50%
• ยกเลิกหลังเช็คงาน = ไม่คืนเงินและส่งงานปกติ</textarea>
</div>

<a href="#" class="btn btn-main"><input type="text" class="edit-inline" style="width:150px; color:#fff;" value="สั่งงานคลิกเลย 🎀"></a>
</div>

<!-- ====== ติดต่อ ====== -->
<div class="footer">
<div class="socials">
<a href="#">Facebook</a>
<a href="#">Instagram</a>
<a href="#">LINE</a>
</div>

<p class="small">
© 2026 <input type="text" class="edit-inline" style="width:100px" value="𝐊𝐨𝐲𝐚𝐧𝐠𝐢 𝜗𝜚˚⋆">
</p>
</div>

</div>
</body>
</html>
