<nav class="bottom-nav">
    <a href="index.html" class="nav-item active"><span class="nav-icon">🏠</span><span>หน้าหลัก</span></a>
    <a href="portfolio.html" class="nav-item"><span class="nav-icon">📦</span><span>สินค้า</span></a>
    <a href="contact.html" class="nav-item"><span class="nav-icon">💬</span><span>ติดต่อ</span></a>
    <!-- ลบ href ออกแล้วใส่ onclick แทน -->
    <a href="javascript:void(0)" class="nav-item" onclick="checkAdminAccess()">
        <span class="nav-icon">⚙️</span><span>ตั้งค่า</span>
    </a>
</nav>

<script>
    // --- โค้ดเดิมของคุณ (ดึงข้อมูลมาแสดงผล) ---
    const savedData = JSON.parse(localStorage.getItem('shopData'));
    if(savedData) {
        document.getElementById('disp-name').innerText = savedData.name || "Premium Store";
        document.getElementById('disp-footer-name').innerText = savedData.name || 'Store';
        document.getElementById('disp-rules').innerText = savedData.rules || "";
        document.getElementById('link-line-btn').href = savedData.line || '#';

        const container = document.getElementById('app-list-container');
        container.innerHTML = ''; 

        if(savedData.products && savedData.products.length > 0) {
            savedData.products.forEach(product => {
                const isOut = parseInt(product.stock) <= 0;
                
                // ใช้รูปภาพ Base64 จาก Admin ถ้าไม่มีให้ใช้ Emoji ตามหมวดหมู่
                let displayImg = product.img ? 
                    `<img src="${product.img}" style="width:100%;height:100%;object-fit:cover;border-radius:12px;">` : 
                    (product.cat === 'streaming' ? '🎬' : product.cat === 'working' ? '💼' : '📚');

                const itemHTML = `
                    <div class="app-item ${isOut ? 'out-of-stock' : ''}">
                        <div class="app-icon">${displayImg}</div>
                        <div class="app-info">
                            <span class="app-name">${product.name}</span>
                            <span class="app-price">${product.price}.-</span>
                            <div class="stock-tag">
                                ${isOut ? '❌ สินค้าหมด' : '✅ ในสต็อก: ' + product.stock + ' ชิ้น'}
                            </div>
                        </div>
                        <a href="${isOut ? '#' : savedData.line}" class="btn-buy ${isOut ? 'btn-out' : ''}">
                            ${isOut ? 'หมด' : 'สั่งซื้อ'}
                        </a>
                    </div>
                `;
                container.innerHTML += itemHTML;
            });
        }
    }

    // --- ส่วนที่เพิ่มใหม่: ฟังก์ชันเช็ครหัสผ่านก่อนเข้าหน้า Admin ---
    function checkAdminAccess() {
        const PIN = "2003";
        
        // ถ้าเคย Login แล้วในเซสชันนี้ ให้เข้าไปได้เลย
        if (sessionStorage.getItem("isLoggedIn") === "true") {
            window.location.href = "admin.html";
            return;
        }

        // ถามรหัสผ่าน
        const pass = prompt("🔐 กรุณากรอกรหัสผ่านเพื่อเข้าสู่โหมดตั้งค่า:");
        
        if (pass === PIN) {
            sessionStorage.setItem("isLoggedIn", "true");
            window.location.href = "admin.html";
        } else if (pass !== null) { // ถ้ากด Cancel จะไม่ขึ้น Alert
            alert("❌ รหัสผ่านไม่ถูกต้อง!");
        }
    }
</script>
