<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Stock Categories</title>
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root{ --bg:#1a1a1a; --main:#9d81e1; --dark:#d1c4e9; --white:#252525; --green:#4caf50; --red:#ff5252; --glow:rgba(157,129,225,0.3); }
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Mitr',sans-serif;}
        body { background: var(--bg); color: #fff; padding: 20px 15px 120px; display: flex; justify-content: center; }
        
        /* --- Login Modal --- */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .login-card { background: var(--white); padding: 40px 30px; border-radius: 30px; width: 90%; max-width: 360px; border: 2px solid var(--main); box-shadow: 0 0 30px var(--glow); text-align: center; }
        .login-input { width: 100%; padding: 15px; background: #1a1a1a; border: 1.5px solid #444; border-radius: 15px; color: #fff; font-size: 20px; text-align: center; outline: none; margin-bottom: 20px; -webkit-text-security: disc; }

        .admin-container { width: 100%; max-width: 480px; }
        .header-section { text-align: center; margin-bottom: 25px; }
        .header-section h1 { color: var(--main); font-size: 24px; }

        /* --- Category Cards (หน้าแรกของ Admin) --- */
        .category-grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-bottom: 20px; }
        .cat-card { background: var(--white); padding: 25px; border-radius: 25px; border: 1.5px solid #333; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: space-between; }
        .cat-card:hover { border-color: var(--main); transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .cat-info h3 { font-size: 18px; margin-bottom: 5px; }
        .cat-info span { font-size: 12px; color: var(--dark); opacity: 0.7; }
        .cat-icon { font-size: 30px; background: rgba(157,129,225,0.1); width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; border-radius: 18px; }

        /* --- Stock Editor (หน้าจัดการสินค้า) --- */
        #stock-editor { display: none; }
        .back-btn { background: none; border: none; color: var(--main); cursor: pointer; display: flex; align-items: center; gap: 5px; margin-bottom: 20px; font-size: 14px; }
        
        .stock-item { background: var(--white); border-radius: 22px; padding: 20px; margin-bottom: 15px; border: 1px solid #333; }
        .item-header { display: flex; gap: 15px; align-items: center; margin-bottom: 15px; }
        .img-preview { width: 65px; height: 65px; border-radius: 12px; object-fit: cover; border: 1px solid var(--main); }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        label { display: block; font-size: 11px; color: var(--dark); margin-bottom: 4px; }
        input { width: 100%; padding: 10px; background: #1a1a1a; border: 1px solid #444; border-radius: 10px; color: #fff; font-size: 13px; }

        .btn { border: none; border-radius: 15px; font-weight: 500; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-save { background: var(--main); color: white; padding: 15px; width: 100%; font-size: 16px; margin-top: 20px; border-radius: 20px; }
        .btn-add { background: #333; color: var(--main); border: 1.5px dashed var(--main); padding: 12px; width: 100%; margin-bottom: 20px; }
        .btn-del { background: rgba(255, 82, 82, 0.1); color: var(--red); padding: 6px; width: 100%; font-size: 11px; border-radius: 8px; margin-top: 10px; }

        /* --- Bottom Nav --- */
        .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: #252525; display: flex; justify-content: space-around; padding: 8px 0 12px; border-radius: 15px 15px 0 0; border-top: 1.5px solid var(--main); box-shadow: 0 -4px 15px rgba(0,0,0,0.4); z-index: 1000; }
        .nav-item { text-decoration: none; color: var(--dark); display: flex; flex-direction: column; align-items: center; font-size: 9px; flex: 1; }
        .nav-item.active { color: var(--main); }
    </style>
</head>
<body>

    <!-- Login Modal -->
    <div id="login-overlay">
        <div class="login-card">
            <h2 style="color:var(--main); margin-bottom:10px;">🔐 Admin Login</h2>
            <input type="text" id="passInput" class="login-input" placeholder="Passcode">
            <button class="btn btn-save" onclick="checkPass()">ตกลง</button>
        </div>
    </div>

    <!-- Main Container -->
    <div id="main-admin" class="admin-container" style="display:none;">
        
        <!-- หน้าเลือกหมวดหมู่ -->
        <div id="category-selector">
            <div class="header-section">
                <h1>📦 Stock Categories</h1>
                <p style="font-size: 12px; color: var(--dark);">เลือกหมวดหมู่ที่ต้องการจัดการ</p>
            </div>
            <div class="category-grid">
                <div class="cat-card" onclick="openEditor('streaming')">
                    <div class="cat-info">
                        <h3>Streaming Apps</h3>
                        <span id="count-streaming">0 รายการ</span>
                    </div>
                    <div class="cat-icon">📺</div>
                </div>
                <div class="cat-card" onclick="openEditor('working')">
                    <div class="cat-info">
                        <h3>Working Tools</h3>
                        <span id="count-working">0 รายการ</span>
                    </div>
                    <div class="cat-icon">💼</div>
                </div>
                <div class="cat-card" onclick="openEditor('education')">
                    <div class="cat-info">
                        <h3>Education</h3>
                        <span id="count-education">0 รายการ</span>
                    </div>
                    <div class="cat-icon">🎓</div>
                </div>
            </div>
        </div>

        <!-- หน้าแก้ไขสินค้าในหมวด -->
        <div id="stock-editor">
            <button class="back-btn" onclick="closeEditor()">⬅️ กลับไปหน้าหมวดหมู่</button>
            <h2 id="current-cat-title" style="margin-bottom: 20px; color: var(--main);">หมวดหมู่</h2>
            
            <div id="items-list"></div>

            <button class="btn btn-add" onclick="addNewItem()">
                <span>➕ เพิ่มสินค้าใหม่ในหมวดนี้</span>
            </button>

            <button class="btn btn-save" onclick="saveData()">
                <span>💾 บันทึกการเปลี่ยนแปลง</span>
            </button>
        </div>

    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">🏠<br>หน้าหลัก</a>
        <a href="portfolio.html" class="nav-item">📦<br>สินค้า</a>
        <div class="nav-item active">⚙️<br>ตั้งค่า</div>
    </nav>

    <script>
        const PIN = "2003";
        let activeCategory = '';
        let allProducts = [];

        window.onload = () => {
            if (sessionStorage.getItem("isLoggedIn") === "true") unlockAdmin();
        }

        function checkPass() {
            if (document.getElementById("passInput").value === PIN) {
                sessionStorage.setItem("isLoggedIn", "true");
                unlockAdmin();
            } else { alert("❌ รหัสผิด!"); }
        }

        function unlockAdmin() {
            document.getElementById("login-overlay").style.display = "none";
            document.getElementById("main-admin").style.display = "block";
            loadData();
        }

        // โหลดข้อมูลและนับจำนวนสินค้าแต่ละหมวด
        function loadData() {
            const savedData = JSON.parse(localStorage.getItem('shopData'));
            allProducts = (savedData && savedData.products) ? savedData.products : [];
            
            const counts = { streaming: 0, working: 0, education: 0 };
            allProducts.forEach(p => { if(counts[p.cat] !== undefined) counts[p.cat]++; });
            
            document.getElementById('count-streaming').innerText = counts.streaming + " รายการ";
            document.getElementById('count-working').innerText = counts.working + " รายการ";
            document.getElementById('count-education').innerText = counts.education + " รายการ";
        }

        // เปิดหน้าแก้ไขสินค้าตามหมวดที่จิ้ม
        function openEditor(cat) {
            activeCategory = cat;
            document.getElementById('category-selector').style.display = 'none';
            document.getElementById('stock-editor').style.display = 'block';
            document.getElementById('current-cat-title').innerText = "📍 " + cat.toUpperCase();
            
            renderItems();
        }

        function closeEditor() {
            document.getElementById('category-selector').style.display = 'block';
            document.getElementById('stock-editor').style.display = 'none';
            loadData();
        }

        function renderItems() {
            const list = document.getElementById('items-list');
            list.innerHTML = '';
            const filtered = allProducts.filter(p => p.cat === activeCategory);
            
            filtered.forEach((p, index) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'stock-item';
                itemDiv.innerHTML = `
                    <div class="item-header">
                        <img src="${p.img || 'https://via.placeholder.com/80'}" class="img-preview">
                        <div style="flex:1">
                            <label>ชื่อสินค้า</label>
                            <input type="text" class="edit-name" value="${p.name}" onchange="updateItemLocal(this, ${index}, 'name')">
                        </div>
                    </div>
                    <div class="form-grid">
                        <div>
                            <label>ราคา (บาท)</label>
                            <input type="number" class="edit-price" value="${p.price}" onchange="updateItemLocal(this, ${index}, 'price')">
                        </div>
                        <div>
                            <label>สต็อก</label>
                            <input type="number" class="edit-stock" value="${p.stock}" onchange="updateItemLocal(this, ${index}, 'stock')">
                        </div>
                    </div>
                    <button class="btn btn-del" onclick="deleteItem('${p.name}')">🗑️ ลบสินค้านี้</button>
                `;
                list.appendChild(itemDiv);
            });
        }

        function addNewItem() {
            const name = prompt("ระบุชื่อสินค้าใหม่:");
            if (name) {
                allProducts.push({ name: name, price: 0, stock: 0, cat: activeCategory, img: '' });
                renderItems();
            }
        }

        function deleteItem(name) {
            if(confirm('ลบรายการนี้ใช่หรือไม่?')) {
                allProducts = allProducts.filter(p => p.name !== name);
                renderItems();
            }
        }

        function saveData() {
            localStorage.setItem('shopData', JSON.stringify({ products: allProducts }));
            alert('✅ บันทึกสต็อกในหมวด ' + activeCategory + ' เรียบร้อย!');
            closeEditor();
        }

        // อัปเดตค่าใน Array ใหญ่แบบ Real-time
        function updateItemLocal(input, idxInFiltered, field) {
            const filtered = allProducts.filter(p => p.cat === activeCategory);
            const itemToUpdate = filtered[idxInFiltered];
            if(itemToUpdate) itemToUpdate[field] = input.value;
        }
    </script>
</body>
</html>
